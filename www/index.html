<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#001e50">
    <title>GesCar OS - Entregas Móvil</title>f
    
    <!-- 1. ENLACES PWA OBLIGATORIOS (Añadidos) -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GesCar Entregas">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 2. Corregido el "0" sobrante al final de esta línea -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ==========================================
        // 🔒 CONFIGURACIÓN FIREBASE (CASTELLANA WAGEN)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCRfERugbIVfAXtKa7mGdLLTm6xwxb5wlE",
            authDomain: "gestion-flotas-vw.firebaseapp.com",
            projectId: "gestion-flotas-vw",
            storageBucket: "gestion-flotas-vw.firebasestorage.app",
            messagingSenderId: "1070891769268",
            appId: "1:1070891769268:web:47b04e6d62e576038966e1"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);

        // Exponemos las funciones necesarias al window para los botones
        window.query = query;
        window.collection = collection;
        window.where = where;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
    </script>
</head>
<body class="bg-gray-100 font-sans pb-10">

    <header class="bg-[#001e50] text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div>
            <h1 class="font-black text-lg uppercase tracking-widest leading-tight">ENTREGAS</h1>
            <p id="fecha-hoy" class="text-[10px] text-[#00b0f0] font-bold uppercase tracking-wider mt-0.5"></p>
        </div>
        <button onclick="window.cargarEntregasHoy()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 active:scale-95 transition-transform border border-white/20">
            <i class="ph-bold ph-arrows-clockwise text-xl"></i>
        </button>
    </header>

    <div class="bg-[#001438] px-4 pb-3 pt-1 sticky top-[72px] z-40 shadow-md flex items-center justify-between border-t border-white/10">
        <label for="selector-fecha" class="text-white/80 font-bold text-xs uppercase tracking-widest"><i class="ph-bold ph-calendar-blank"></i> Cambiar día:</label>
        <input type="date" id="selector-fecha" class="bg-white px-3 py-1.5 rounded text-[#001e50] font-black text-sm border-none outline-none shadow-inner">
    </div>

    <main id="contenedor-entregas" class="p-4 space-y-4">
        <div class="text-center p-10">
            <i class="ph-bold ph-spinner animate-spin text-4xl text-[#001e50]"></i>
            <p class="mt-2 text-gray-500 font-bold text-sm">Cargando agenda en vivo...</p>
        </div>
    </main>

    <script>
        const opcionesFecha = { weekday: 'long', day: 'numeric', month: 'long' };
        const selectorFecha = document.getElementById('selector-fecha');
        
        // Ponemos el día de hoy por defecto al entrar
        selectorFecha.value = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-hoy').innerText = new Date().toLocaleDateString('es-ES', opcionesFecha);

        // 3. Escuchamos si el entregador cambia la fecha (Solucionado bug de zona horaria)
        selectorFecha.addEventListener('change', (e) => {
            const partesFecha = e.target.value.split('-');
            const nuevaFecha = new Date(partesFecha[0], partesFecha[1] - 1, partesFecha[2]);
            document.getElementById('fecha-hoy').innerText = nuevaFecha.toLocaleDateString('es-ES', opcionesFecha);
            window.cargarEntregasHoy(); // Recargamos la lista automáticamente
        });

        // MOTOR: Descargar agenda del día
        window.cargarEntregasHoy = async function() {
            const contenedor = document.getElementById('contenedor-entregas');
            contenedor.innerHTML = `<div class="text-center p-10"><i class="ph-bold ph-spinner animate-spin text-4xl text-[#001e50]"></i><p class="mt-2 text-gray-500 font-bold text-sm">Sincronizando...</p></div>`;

            // Verificamos si Firebase ha terminado de arrancar
            if (!window.db) {
                setTimeout(window.cargarEntregasHoy, 500);
                return;
            }

            // Leemos la fecha exacta que marca el calendario del móvil
            let diaLimpio = document.getElementById('selector-fecha').value;

            try {
                // Buscamos solo las citas de hoy
                const q = window.query(window.collection(window.db, "citas_agenda"), window.where("fecha", "==", diaLimpio));
                const querySnapshot = await window.getDocs(q);
                
                let citas = [];
                querySnapshot.forEach((doc) => {
                    citas.push({ id: doc.id, ...doc.data() });
                });

                // Orden cronológico (Ej: las de las 10:00 primero, las de las 19:00 al final)
                citas.sort((a, b) => a.hora.localeCompare(b.hora));

                if (citas.length === 0) {
                    contenedor.innerHTML = `
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 text-center mt-10">
                            <i class="ph-fill ph-check-circle text-6xl text-emerald-500 mb-3"></i>
                            <h2 class="text-[#001e50] font-black text-xl">Día Libre</h2>
                            <p class="text-gray-500 text-sm mt-1 font-bold">No hay entregas programadas en el cuadrante para hoy.</p>
                        </div>`;
                    return;
                }

                // Pintamos las tarjetas
                contenedor.innerHTML = citas.map(cita => window.renderizarTarjetaMovil(cita)).join('');

            } catch (error) {
                console.error("Error de lectura Firebase:", error);
                Swal.fire('Error de red', 'No se ha podido conectar con el servidor central de GesCar.', 'error');
                contenedor.innerHTML = `<div class="bg-red-50 p-6 rounded-xl border border-red-200 text-center mt-10"><i class="ph-bold ph-wifi-slash text-4xl text-red-500 mb-2"></i><p class="text-red-700 font-bold text-sm">Sin conexión con la central.</p></div>`;
            }
        };

        // PINTOR DE TARJETAS MÓVILES
        window.renderizarTarjetaMovil = function(c) {
            // Formateo de botones de contacto rápido
            let tlfLimpio = c.telefono ? String(c.telefono).replace(/\s/g, '').replace(/^\+?34/, '') : '';
            let btnWhatsApp = tlfLimpio ? `<a href="https://wa.me/34${tlfLimpio}" target="_blank" class="flex-1 bg-[#25D366] text-white py-3.5 rounded-xl flex justify-center items-center gap-2 font-black text-xs active:scale-95 transition-transform shadow-sm"><i class="ph-bold ph-whatsapp-logo text-lg"></i> WhatsApp</a>` : '';
            let btnLlamar = tlfLimpio ? `<a href="tel:+34${tlfLimpio}" class="flex-1 bg-gray-100 text-[#001e50] py-3.5 rounded-xl flex justify-center items-center gap-2 font-black text-xs active:scale-95 transition-transform border border-gray-200 shadow-sm"><i class="ph-bold ph-phone text-lg"></i> Llamar</a>` : '';
            
            // Evaluadores visuales
            let etiquetaVO = (c.entregaVO === 'SÍ' || c.entregaVO === 'SI') ? `<span class="bg-purple-100 text-purple-800 text-[10px] px-2 py-1 rounded font-black border border-purple-200 uppercase tracking-widest"><i class="ph-bold ph-car-profile"></i> Recoger V.O.</span>` : '';
            let borderColor = c.agente === 'ANTONIO' ? 'border-orange-400' : 'border-blue-400';
            
            let htmlContacto = (btnWhatsApp || btnLlamar) ? `<div class="flex gap-2 mb-4">${btnWhatsApp} ${btnLlamar}</div>` : '';

            return `
            <div class="bg-white rounded-2xl shadow-sm border-l-8 ${borderColor} p-5 relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <div class="pr-3">
                        <h2 class="font-black text-2xl text-[#001e50] uppercase leading-tight">${c.modelo}</h2>
                        <p class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-wide"><i class="ph-bold ph-user"></i> ${c.cliente}</p>
                    </div>
                    <div class="bg-gray-50 px-3 py-2 rounded-xl text-center border border-gray-200 shrink-0 shadow-inner">
                        <span class="block text-[9px] text-gray-400 font-black uppercase tracking-widest mb-0.5">Hora</span>
                        <span class="block text-xl font-black text-[#001e50]">${c.hora}</span>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="bg-gray-100 text-gray-900 text-sm px-3 py-1.5 rounded-lg font-black tracking-widest border border-gray-200">${c.matricula}</span>
                    <span class="bg-blue-50 text-[#001e50] text-[10px] px-2.5 py-1.5 rounded-lg font-bold border border-blue-100 font-mono flex items-center">VIN: ${c.bastidor || 'S/D'}</span>
                    ${etiquetaVO}
                </div>

                ${c.notas ? `<div class="bg-yellow-50 p-3.5 rounded-xl border border-yellow-200 text-xs text-yellow-900 mb-4 font-medium"><strong class="font-black uppercase tracking-widest text-[10px] block mb-1 text-amber-700"><i class="ph-bold ph-note"></i> Avisos a tener en cuenta:</strong> ${c.notas}</div>` : ''}

                ${htmlContacto}

                <button onclick="window.marcarComoEntregadoMovil('${c.id}', '${c.matricula}')" class="w-full bg-[#001e50] text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md border border-[#001e50]">
                    <i class="ph-bold ph-key text-xl"></i> Confirmar Entrega
                </button>
            </div>
            `;
        };

        // ACCIÓN: Confirmar la entrega y tachar de la agenda
        window.marcarComoEntregadoMovil = async function(idCita, matricula) {
            Swal.fire({
                title: '¿Confirmar Entrega?',
                text: "El vehículo pasará directamente al historial de vehículos finalizados.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981', // Verde éxito
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, entregar',
                cancelButtonText: 'Cancelar'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Sincronizando central...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    try {
                        let fHoy = new Date().toLocaleDateString('es-ES');
                        let matriculaLimpia = String(matricula).replace(/\s/g, '').toUpperCase();
                        
                        // 1. Buscamos el coche en la base activa (Campa) cruzando su matrícula
                        if (matriculaLimpia !== "S/M" && matriculaLimpia !== "---") {
                            const qCoche = window.query(window.collection(window.db, "vehiculos"), window.where("matricula", "==", matriculaLimpia));
                            const snapCoche = await window.getDocs(qCoche);
                            
                            // Si lo encontramos en la campa, lo marcamos como entregado
                            if (!snapCoche.empty) {
                                let cocheId = snapCoche.docs[0].id;
                                await window.updateDoc(window.doc(window.db, "vehiculos", cocheId), {
                                    entregado: true,
                                    fechaEntrega: fHoy
                                });
                            }
                        }

                        // 2. Eliminamos la cita de la agenda diaria para que desaparezca del teléfono
                        await window.deleteDoc(window.doc(window.db, "citas_agenda", idCita));

                        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: '¡Entrega Completada!', showConfirmButton: false, timer: 2000 });
                        
                        // Recargamos el listado del móvil
                        window.cargarEntregasHoy(); 

                    } catch (error) {
                        console.error(error);
                        Swal.fire('Error del Servidor', 'No se ha podido procesar la entrega. Habla con BackOffice.', 'error');
                    }
                }
            });
        };

        // AUTO-ARRANQUE: Lanzamos la búsqueda en cuanto se abre la web
        window.addEventListener('load', () => {
            setTimeout(window.cargarEntregasHoy, 800);
        });
    </script>

    <!-- 4. REGISTRO DEL SERVICE WORKER PARA INSTALACIÓN ANDROID (Añadido) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Motor PWA activado con éxito.', registration.scope);
                    })
                    .catch((error) => {
                        console.error('Fallo al activar el motor PWA:', error);
                    });
            });
        }
    </script>
</body>
</html>
