        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, getDoc, arrayUnion, deleteDoc, getDocs, increment, query, where } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, updatePassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

          messagingSenderId: "1070891769268",
          appId: "1:1070891769268:web:47b04e6d62e576038966e1"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.updatePassword = updatePassword;
        window.collection = collection; window.onSnapshot = onSnapshot; window.doc = doc; 
        window.updateDoc = updateDoc; window.setDoc = setDoc; window.getDoc = getDoc; 
        window.deleteDoc = deleteDoc;
        
        // ¡ESTA ES LA CLAVE PARA QUE NO DÉ ERROR!
        window.getDocs = getDocs;

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const selectorFecha = document.getElementById('selector-fecha-movil');
            if (selectorFecha) {
                // Ponemos la fecha de hoy por defecto al cargar
                selectorFecha.value = new Date().toISOString().split('T')[0];
                selectorFecha.addEventListener('change', window.cargarEntregasHoy);
            }
        });

        // 🔥 MAGIA: Sobrescribimos la orden general para que en móvil pinte tu vista clásica
        window.renderAgenda = function() {
            const div = document.getElementById('contenedorAgenda');
            if (div) {
                div.classList.remove('hidden');
                div.style.display = 'flex';
            }
            window.cargarEntregasHoy();
        };

        window.cargarEntregasHoy = async function() {
            const contenedor = document.getElementById('lista-entregas-movil');
            if(!contenedor) return;
            
            contenedor.innerHTML = `<div class="text-center p-10"><i class="ph-bold ph-spinner animate-spin text-4xl text-[#001e50]"></i><p class="mt-2 text-gray-500 font-bold text-sm">Sincronizando...</p></div>`;

            if (!window.db) {
                setTimeout(window.cargarEntregasHoy, 500);
                return;
            }

            let diaLimpio = document.getElementById('selector-fecha-movil').value;

            try {
                // Compatibilidad con las consultas si "query" no existe a nivel global
                let qRef;
                if(window.query && window.where) {
                    qRef = window.query(window.collection(window.db, "citas_agenda"), window.where("fecha", "==", diaLimpio));
                } else {
                    qRef = window.collection(window.db, "citas_agenda");
                }
                
                const snap = await window.getDocs(qRef);
                
                let citas = [];
                snap.forEach((doc) => { 
                    let data = doc.data();
                    // Si hicimos query por where no hace falta este IF, pero si no, lo filtramos manualmente
                    if(data.fecha === diaLimpio || (data.fechaHora && data.fechaHora.startsWith(diaLimpio))) {
                        citas.push({ id: doc.id, ...data }); 
                    }
                });

                citas.sort((a, b) => (a.hora || "").localeCompare(b.hora || ""));

                if (citas.length === 0) {
                    contenedor.innerHTML = `
                        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200 text-center mt-4">
                            <i class="ph-fill ph-check-circle text-6xl text-emerald-500 mb-3"></i>
                            <h2 class="text-[#001e50] font-black text-xl">Día Libre</h2>
                            <p class="text-gray-500 text-sm mt-1 font-bold">No hay entregas programadas en el cuadrante para hoy.</p>
                        </div>`;
                    return;
                }

                contenedor.innerHTML = citas.map(cita => window.renderizarTarjetaMovil(cita)).join('');
            } catch (error) {
                console.error("Error de lectura Firebase:", error);
                contenedor.innerHTML = `<div class="bg-red-50 p-6 rounded-xl border border-red-200 text-center mt-4"><i class="ph-bold ph-wifi-slash text-4xl text-red-500 mb-2"></i><p class="text-red-700 font-bold text-sm">Sin conexión con la central.</p></div>`;
            }
        };

        window.renderizarTarjetaMovil = function(c) {
            let tlfLimpio = c.telefono ? String(c.telefono).replace(/\s/g, '').replace(/^\+?34/, '') : '';
            let btnWhatsApp = tlfLimpio ? `<a href="https://wa.me/34${tlfLimpio}" target="_blank" class="flex-1 bg-[#25D366] text-white py-3.5 rounded-xl flex justify-center items-center gap-2 font-black text-xs active:scale-95 transition-transform shadow-sm"><i class="ph-bold ph-whatsapp-logo text-lg"></i> WhatsApp</a>` : '';
            let btnLlamar = tlfLimpio ? `<a href="tel:+34${tlfLimpio}" class="flex-1 bg-gray-100 text-[#001e50] py-3.5 rounded-xl flex justify-center items-center gap-2 font-black text-xs active:scale-95 transition-transform border border-gray-200 shadow-sm"><i class="ph-bold ph-phone text-lg"></i> Llamar</a>` : '';
            
            let etiquetaVO = (c.entregaVO === 'SÍ' || c.entregaVO === 'SI') ? `<span class="bg-purple-100 text-purple-800 text-[10px] px-2 py-1 rounded font-black border border-purple-200 uppercase tracking-widest"><i class="ph-bold ph-car-profile"></i> Recoger V.O.</span>` : '';
            let borderColor = (c.agente === 'ANTONIO') ? 'border-orange-400' : 'border-blue-400';
            
            let htmlContacto = (btnWhatsApp || btnLlamar) ? `<div class="flex gap-2 mb-4">${btnWhatsApp} ${btnLlamar}</div>` : '';

            return `
            <div class="bg-white rounded-2xl shadow-sm border-l-8 ${borderColor} p-5 relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <div class="pr-3">
                        <h2 class="font-black text-2xl text-[#001e50] uppercase leading-tight">${c.modelo || 'Vehículo'}</h2>
                        <p class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-wide"><i class="ph-bold ph-user"></i> ${c.cliente || 'Cliente'}</p>
                    </div>
                    <div class="bg-gray-50 px-3 py-2 rounded-xl text-center border border-gray-200 shrink-0 shadow-inner">
                        <span class="block text-[9px] text-gray-400 font-black uppercase tracking-widest mb-0.5">Hora</span>
                        <span class="block text-xl font-black text-[#001e50]">${c.hora || '--:--'}</span>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="bg-gray-100 text-gray-900 text-sm px-3 py-1.5 rounded-lg font-black tracking-widest border border-gray-200">${c.matricula || 'S/M'}</span>
                    <span class="bg-blue-50 text-[#001e50] text-[10px] px-2.5 py-1.5 rounded-lg font-bold border border-blue-100 font-mono flex items-center">VIN: ${c.bastidor || 'S/D'}</span>
                    ${etiquetaVO}
                </div>

                ${c.notas ? `<div class="bg-yellow-50 p-3.5 rounded-xl border border-yellow-200 text-xs text-yellow-900 mb-4 font-medium"><strong class="font-black uppercase tracking-widest text-[10px] block mb-1 text-amber-700"><i class="ph-bold ph-note"></i> Avisos a tener en cuenta:</strong> ${c.notas}</div>` : ''}

                ${htmlContacto}

                <button onclick="window.marcarComoEntregadoMovil('${c.id}', '${c.matricula}')" class="w-full bg-[#001e50] text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-md border border-[#001e50]">
                    <i class="ph-bold ph-key text-xl"></i> Confirmar Entrega
                </button>
            </div>
            `;
        };

        window.marcarComoEntregadoMovil = async function(idCita, matricula) {
            Swal.fire({
                title: '¿Iniciar proceso de Entrega?',
                text: "Se abrirá el asistente para enviar la foto y la reseña al cliente.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#001e50',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Sí, iniciar entrega',
                cancelButtonText: 'Cancelar'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'Localizando vehículo...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                    try {
                        let matriculaLimpia = String(matricula).replace(/\s/g, '').toUpperCase();
                        let cocheIdFb = null;
                        
                        // 1. Buscamos el ID real del coche en la base de datos
                        if (matriculaLimpia !== "S/M" && matriculaLimpia !== "---") {
                            const snapCoche = await window.getDocs(window.collection(window.db, "vehiculos"));
                            snapCoche.forEach(doc => {
                                if (doc.data().matricula === matriculaLimpia || doc.data().B === matriculaLimpia) {
                                    cocheIdFb = doc.id;
                                }
                            });
                        }

                        if (cocheIdFb) {
                            // 2. Borramos la cita de la agenda móvil para limpiar la pantalla
                            await window.deleteDoc(window.doc(window.db, "citas_agenda", idCita));
                            window.cargarEntregasHoy(); 

                            // 3. ¡LA MAGIA! Llamamos a tu función principal del ordenador
                            if (typeof window.marcarComoEntregado === 'function') {
                                window.marcarComoEntregado(cocheIdFb);
                            } else {
                                Swal.fire('Error', 'La función de fotos y reseñas no está disponible en este momento.', 'error');
                            }
                        } else {
                            Swal.fire('Aviso', 'Este vehículo no está en la base de datos principal, no se puede iniciar el proceso de fotos.', 'info');
                        }

                    } catch (error) {
                        console.error(error);
                        Swal.fire('Error', 'Hubo un problema al intentar iniciar la entrega.', 'error');
                    }
                }
            });
        };
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('Motor PWA activado en Móvil.', registration.scope);
                    })
                    .catch((error) => {
                        console.error('Fallo al activar el motor PWA en Móvil:', error);
                    });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const cargarAgendaMovil = () => {
                if (typeof window.renderAgenda === 'function') {
                    window.renderAgenda();
                }
            };
            setTimeout(cargarAgendaMovil, 400);
            setTimeout(cargarAgendaMovil, 1200);
        });
    </script>
