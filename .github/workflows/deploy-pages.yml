name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Warm up before deploy
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Wait before retry 2
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Wait before retry 3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Resolve deployment result
        id: deployment
        shell: bash
        run: |
          PAGE_URL=""

          if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_1.outputs.page_url }}"
          elif [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_2.outputs.page_url }}"
          elif [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_3.outputs.page_url }}"
          fi

          if [ -z "$PAGE_URL" ]; then
            echo "All deploy attempts failed" >&2
            exit 1
          fi

          echo "page_url=$PAGE_URL" >> "$GITHUB_OUTPUT"
