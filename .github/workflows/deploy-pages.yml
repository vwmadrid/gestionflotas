name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Warm up before deploy
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Wait before retry 2
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Wait before retry 3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 120

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 1200000
          error_count: 120

      - name: Resolve deployment result
        id: deployment
        shell: bash
        run: |
          PAGE_URL=""
          DEPLOY_OK="false"

          if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_1.outputs.page_url }}"
            DEPLOY_OK="true"
          elif [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_2.outputs.page_url }}"
            DEPLOY_OK="true"
          elif [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            PAGE_URL="${{ steps.deploy_attempt_3.outputs.page_url }}"
            DEPLOY_OK="true"
          else
            PAGE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          fi

          echo "deploy_ok=$DEPLOY_OK" >> "$GITHUB_OUTPUT"
          echo "page_url=$PAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Fallback deploy to gh-pages branch
        id: fallback
        if: steps.deployment.outputs.deploy_ok != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true
          enable_jekyll: false

      - name: Verify deployment strategy
        if: steps.deployment.outputs.deploy_ok != 'true' && steps.fallback.outcome != 'success'
        run: |
          echo "Both strategies failed: deploy-pages API and gh-pages fallback" >&2
          exit 1
