<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VW Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { vw: { blue: '#001e50', light: '#00b0f0', bg: '#f3f4f6' } }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- CONEXIÓN A FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRfERugbIVfAXtKa7mGdLLTm6xwxb5wlE",
      authDomain: "gestion-flotas-vw.firebaseapp.com",
      projectId: "gestion-flotas-vw",
      storageBucket: "gestion-flotas-vw.firebasestorage.app",
      messagingSenderId: "1070891769268",
      appId: "1:1070891769268:web:47b04e6d62e576038966e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    window.db = db;
    window.collection = collection;
    window.onSnapshot = onSnapshot;
    window.doc = doc;
    window.updateDoc = updateDoc;
    window.getDoc = getDoc;
  </script>

  <style>
    body { background-color: var(--vw-bg); }
    .card-pro { background: white; border: 1px solid #e5e7eb; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-pro:hover { border-color: #d1d5db; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transform: translateY(-4px); }
    .timeline-dot { position: relative; }
    .timeline-dot::before { content: ''; position: absolute; left: -1.75rem; top: 0.5rem; width: 0.75rem; height: 0.75rem; background: #00b0f0; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #e5e7eb; }
    
    /* Scrollbars elegantes */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; border: 2px solid #f9fafb; }
    .dark-scroll::-webkit-scrollbar-thumb { background-color: #334155; border: 2px solid #001e50; }
  </style>
</head>
<body class="text-gray-800 antialiased selection:bg-vw-light selection:text-white overflow-hidden">

  <!-- PANTALLA DE LOGIN -->
  <div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-100">
    <div class="bg-white p-12 rounded-[2rem] shadow-2xl w-full max-w-md border border-gray-100 text-center relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-2 bg-vw-blue"></div>
      <div class="w-20 h-20 bg-vw-blue rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
        <i class="ph-fill ph-steering-wheel text-4xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-1 tracking-tight">VW Workspace</h1>
      <p class="text-sm text-gray-500 mb-8 font-medium uppercase tracking-widest">Portal de Empleados</p>
      
      <div class="space-y-4">
        <div class="relative">
          <i class="ph-fill ph-users absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
          <select id="userRole" class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-vw-light outline-none font-bold text-gray-700 appearance-none">
            <option value="taller">Departamento: Taller</option>
            <option value="recambios">Departamento: Recambios</option>
            <option value="entregas">Departamento: Entregas</option>
          </select>
        </div>
        <div class="relative">
          <i class="ph-fill ph-lock-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
          <input type="password" id="userPass" placeholder="Código de acceso" class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-vw-light outline-none font-medium">
        </div>
        <button onclick="iniciar()" class="w-full bg-vw-blue hover:bg-[#001438] text-white font-bold py-4 rounded-2xl transition-all shadow-lg mt-4 text-lg">Acceder al Sistema</button>
      </div>
    </div>
  </div>

  <!-- APLICACIÓN PRINCIPAL (DASHBOARD) -->
  <div id="mainApp" style="display:none;" class="h-screen w-full flex bg-gray-100 overflow-hidden">
    
    <!-- BARRA LATERAL (SIDEBAR) -->
    <aside class="w-72 bg-vw-blue flex flex-col flex-shrink-0 shadow-2xl relative z-20">
      
      <!-- Cabecera Corporativa -->
      <div class="p-8 border-b border-white/10">
        <h1 class="text-3xl font-bold text-white tracking-tight flex items-center gap-2">
          VW<span class="text-vw-light font-light"> WAGEN</span>
        </h1>
        <p class="text-[10px] text-gray-400 font-bold tracking-[0.2em] mt-2 uppercase">Castellana • Vallehermoso</p>
      </div>

      <!-- Menú de Navegación -->
      <nav id="tabsEntregas" class="hidden flex-1 p-6 space-y-3 overflow-y-auto dark-scroll">
        <p class="text-[10px] font-bold text-white/40 uppercase tracking-widest mb-4 ml-2">Menú Principal</p>
        <button id="btnTodos" onclick="cambiarPestana('todos')" class="flex items-center gap-3 px-4 py-3.5 rounded-xl bg-vw-light text-white transition-all font-bold text-sm w-full text-left shadow-lg">
          <i class="ph-bold ph-car-profile text-xl"></i> Flota de Vehículos
        </button>
        <button id="btnIncidencias" onclick="cambiarPestana('incidencias')" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all font-medium text-sm w-full text-left">
          <i class="ph-bold ph-warning text-xl"></i> Alertas y Riesgos
        </button>
        <button id="btnAgenda" onclick="cambiarPestana('agenda')" class="flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all font-medium text-sm w-full text-left">
          <i class="ph-bold ph-calendar-check text-xl"></i> Agenda Entregas
        </button>
      </nav>

      <!-- Panel de Usuario Inferior -->
      <div class="p-6 border-t border-white/10 bg-black/10">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
             <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-vw-light font-bold text-sm border border-white/20">
               <i class="ph-fill ph-user"></i>
             </div>
             <div>
               <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Conectado como</p>
               <p id="roleBadge" class="text-sm font-bold text-white uppercase tracking-wide"></p>
             </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ÁREA PRINCIPAL DE TRABAJO -->
    <div class="flex-1 flex flex-col relative overflow-hidden bg-[#f4f7f9]">
      
      <!-- Cabecera Superior (Top Bar) -->
      <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 h-24 px-10 flex items-center justify-between flex-shrink-0 shadow-sm z-10">
        <div class="flex-1 max-w-2xl">
          <div id="barraBusqueda" class="hidden relative group">
            <i class="ph-bold ph-magnifying-glass absolute left-5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xl group-focus-within:text-vw-light transition-colors"></i>
            <input type="text" id="buscadorInput" onkeyup="filtrarCoches()" placeholder="Buscar por modelo, bastidor o matrícula..." class="w-full pl-14 pr-6 py-4 bg-gray-100 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-vw-light/20 focus:border-vw-light outline-none transition-all font-medium text-sm text-gray-700 shadow-inner">
          </div>
        </div>
        <button onclick="cerrarSesion()" class="ml-6 flex items-center gap-2 px-5 py-3 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all font-bold text-sm border border-transparent hover:border-red-100">
          <i class="ph-bold ph-sign-out text-xl"></i> Desconectar
        </button>
      </header>

      <!-- Lienzo de Tarjetas (Scrollable) -->
      <main class="flex-1 overflow-y-auto p-10 scroll-smooth">
        <div class="max-w-7xl mx-auto">
           <!-- Aquí entra el Grid para mostrar las tarjetas lado a lado -->
           <div id="contenedorPrincipal" class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-8"></div>
           
           <div id="contenedorAgendaWrapper" class="hidden">
             <div class="bg-white rounded-[2rem] p-10 border border-gray-100 shadow-xl max-w-4xl mx-auto">
               <h2 class="text-2xl font-bold text-gray-900 mb-8 flex items-center gap-3">
                 <div class="p-3 bg-blue-50 rounded-xl text-vw-light"><i class="ph-fill ph-calendar-check text-2xl"></i></div>
                 Calendario de Entregas
               </h2>
               <div id="contenedorAgenda" class="border-l-4 border-gray-100 ml-6 pl-8 space-y-8"></div>
             </div>
           </div>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL DE CHAT -->
  <div id="chatModal" class="fixed inset-0 z-50 hidden bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden border border-gray-100">
      <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <div>
          <h3 class="font-bold text-gray-900 flex items-center gap-2 text-lg"><i class="ph-fill ph-chats text-vw-light text-2xl"></i> Comunicación Interna</h3>
          <p id="chatSubtitulo" class="text-sm font-medium text-gray-500 mt-1"></p>
        </div>
        <button onclick="cerrarChat()" class="p-2.5 text-gray-400 hover:text-gray-700 hover:bg-gray-200 bg-white rounded-full border border-gray-200 transition-colors"><i class="ph-bold ph-x text-lg"></i></button>
      </div>
      <div id="chatMessages" class="p-8 flex-grow overflow-y-auto chat-scroll bg-white space-y-5 flex flex-col"></div>
      <div class="p-6 bg-gray-50 border-t border-gray-100 flex gap-3">
        <input type="hidden" id="chatFilaActiva">
        <input type="text" id="chatInput" placeholder="Escribe un mensaje de coordinación..." class="flex-grow px-5 py-3 border border-gray-300 rounded-2xl focus:ring-4 focus:ring-vw-light/20 focus:border-vw-light outline-none text-sm font-medium transition-all">
        <button onclick="enviarMensajeChat()" class="px-6 py-3 bg-vw-blue hover:bg-[#001438] text-white rounded-2xl shadow-lg transition-colors flex items-center justify-center"><i class="ph-bold ph-paper-plane-right text-xl"></i></button>
      </div>
    </div>
  </div>

  <script>
    let userRole = "";
    let activeTab = 'todos'; 
    let unsubscribeFirebase = null; 

    window.onload = function() {
      const rolGuardado = localStorage.getItem('vw_departamento');
      if (rolGuardado) {
        userRole = rolGuardado;
        document.getElementById('userRole').value = rolGuardado;
        iniciarAppDirectamente(rolGuardado);
      }
    };

    function iniciar() {
      userRole = document.getElementById('userRole').value;
      const userPass = document.getElementById('userPass').value;
      const contrasenas = { 'taller': 'taller2026', 'recambios': 'piezas2026', 'entregas': 'vw2026' };

      if (userPass !== contrasenas[userRole]) {
        Swal.fire({ icon: 'error', title: 'Acceso Denegado', text: 'Contraseña incorrecta.', confirmButtonColor: '#001e50', customClass: { popup: 'rounded-3xl' }});
        return; 
      }
      localStorage.setItem('vw_departamento', userRole);
      iniciarAppDirectamente(userRole);
    }

    function iniciarAppDirectamente(rol) {
      document.getElementById('roleBadge').innerText = rol;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      
      if (rol === 'entregas') {
        document.getElementById('tabsEntregas').classList.remove('hidden');
        document.getElementById('tabsEntregas').classList.add('flex', 'flex-col');
        cambiarPestana('todos');
      } else {
        cargar();
      }
    }

    function cerrarSesion() {
      Swal.fire({
        title: 'Cerrar Sesión', text: '¿Quieres desconectar tu dispositivo?', icon: 'question',
        showCancelButton: true, confirmButtonColor: '#001e50', confirmButtonText: 'Sí, salir', cancelButtonText: 'Cancelar',
        customClass: { popup: 'rounded-3xl' }
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.removeItem('vw_departamento'); 
          userRole = "";
          document.getElementById('userPass').value = ""; 
          document.getElementById('mainApp').style.display = 'none';
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('tabsEntregas').classList.add('hidden');
          document.getElementById('tabsEntregas').classList.remove('flex', 'flex-col');
          document.getElementById('barraBusqueda').style.display = 'none';
          if(unsubscribeFirebase) unsubscribeFirebase(); 
        }
      });
    }

    function cambiarPestana(pestana) {
      activeTab = pestana;
      const btnT = document.getElementById('btnTodos');
      const btnI = document.getElementById('btnIncidencias');
      const btnA = document.getElementById('btnAgenda');
      const barraBusqueda = document.getElementById('barraBusqueda');
      
      const claseInactiva = "flex items-center gap-3 px-4 py-3.5 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all font-medium text-sm w-full text-left";
      const claseActiva = "flex items-center gap-3 px-4 py-3.5 rounded-xl bg-vw-light text-white transition-all font-bold text-sm w-full text-left shadow-lg";

      [btnT, btnI, btnA].forEach(b => b.className = claseInactiva);
      
      if (pestana === 'agenda') {
        document.getElementById('contenedorPrincipal').style.display = 'none';
        document.getElementById('contenedorAgendaWrapper').style.display = 'block';
        btnA.className = claseActiva;
        barraBusqueda.style.display = 'none';
      } else {
        document.getElementById('contenedorPrincipal').style.display = 'grid';
        document.getElementById('contenedorAgendaWrapper').style.display = 'none';
        barraBusqueda.style.display = (pestana === 'todos') ? 'block' : 'none'; 
        if(pestana === 'todos') btnT.className = claseActiva;
        if(pestana === 'incidencias') btnI.className = claseActiva;
      }
      cargar();
    }

    function mostrarError(msg) {
      Swal.fire({ icon: 'error', title: 'Error', text: msg, confirmButtonColor: '#001e50', customClass: { popup: 'rounded-3xl' } });
    }

    // ==========================================
    // LÓGICA EN TIEMPO REAL (FIREBASE)
    // ==========================================
    function cargar() {
      let divP = document.getElementById('contenedorPrincipal');
      if (activeTab !== 'agenda') divP.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400"><i class="ph-bold ph-spinner-gap animate-spin text-5xl mb-4 text-vw-blue"></i><p class="text-base font-bold tracking-wide">Sincronizando con el servidor...</p></div>`;
      if(document.getElementById('buscadorInput')) document.getElementById('buscadorInput').value = "";

      if(unsubscribeFirebase) unsubscribeFirebase();

      unsubscribeFirebase = window.onSnapshot(window.collection(window.db, "vehiculos"), (snapshot) => {
        let coches = [];
        snapshot.forEach((doc) => {
          let c = doc.data();
          c.fila = doc.id; 
          c.A = c.bastidor || ""; c.B = c.matricula || ""; c.C = c.modelo || "";
          coches.push(c);
        });

        coches.sort((a, b) => (b.creadoEn || 0) - (a.creadoEn || 0));

        let htmlSalida = "";

        if (userRole === 'taller') {
          let filtrados = coches.filter(c => c.enTaller && !c.finTaller);
          htmlSalida = filtrados.length === 0 ? vacioUI() : filtrados.map(c => renderTarjetaActiva(c, 'p', c.ordenTaller || "Sin instrucciones", 'Taller')).join('');
          divP.innerHTML = htmlSalida;
        } 
        else if (userRole === 'recambios') {
          let filtrados = coches.filter(c => c.enRecambios && !c.finRecambios);
          htmlSalida = filtrados.length === 0 ? vacioUI() : filtrados.map(c => renderTarjetaActiva(c, 'r', c.ordenRecambios || "Sin instrucciones", 'Recambios')).join('');
          divP.innerHTML = htmlSalida;
        }
        else if (userRole === 'entregas') {
          if (activeTab === 'todos') {
            divP.innerHTML = coches.length === 0 ? vacioUI() : coches.map(c => renderCocheGlobal(c)).join('');
          } 
          else if (activeTab === 'incidencias') {
            let alertas = coches.filter(c => {
               let statusTag = "";
               if (c.enTaller && !c.finTaller && c.enRecambios && !c.finRecambios) statusTag = "TALLER Y RECAMBIOS";
               else if (c.enTaller && !c.finTaller) statusTag = "EN TALLER";
               else if (c.enRecambios && !c.finRecambios) statusTag = "EN RECAMBIOS";
               
               let esRiesgo = c.estado && c.estado.toUpperCase().includes("RIESGO");
               if (esRiesgo || statusTag !== "") { c.statusTag = statusTag; return true; }
               return false;
            });
            divP.innerHTML = alertas.length === 0 ? vacioUI() : alertas.map(a => renderAlertaUI(a)).join('');
          }
          else if (activeTab === 'agenda') {
            let agenda = coches.filter(c => c.fechaCita && c.fechaCita !== "");
            let agendaDiv = document.getElementById('contenedorAgenda');
            if (agenda.length === 0) agendaDiv.innerHTML = `<p class="text-gray-400 text-sm font-medium bg-gray-50 p-6 rounded-2xl border border-gray-100 text-center">No hay entregas programadas en el calendario.</p>`;
            else agendaDiv.innerHTML = agenda.map(a => `
              <div class="timeline-dot pb-6">
                <span class="text-sm font-bold text-vw-light mb-2 block bg-blue-50 w-max px-3 py-1 rounded-lg border border-blue-100 shadow-sm">${a.fechaCita}</span>
                <div class="bg-white border border-gray-200 rounded-2xl p-5 flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
                  <div>
                    <h4 class="font-bold text-gray-900 text-base mb-1">${a.C}</h4>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">${a.A}</span>
                  </div>
                  <span class="bg-gray-100 border border-gray-200 text-sm font-bold px-4 py-2 rounded-xl shadow-inner text-gray-700 tracking-wider">${a.B}</span>
                </div>
              </div>`).join('');
          }
        }
      }, (error) => { mostrarError('Fallo al sincronizar datos.'); });
    }

    function vacioUI() { return `<div class="col-span-full bg-white rounded-[2rem] p-16 text-center border border-gray-100 shadow-sm"><div class="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6"><i class="ph-bold ph-check-circle text-5xl text-emerald-500"></i></div><h3 class="text-xl font-bold text-gray-900 mb-2">Todo al día</h3><p class="text-gray-500 font-medium">No hay registros pendientes en esta sección.</p></div>`; }

    function filtrarCoches() {
      const texto = document.getElementById('buscadorInput').value.toLowerCase();
      const tarjetas = document.querySelectorAll('#contenedorPrincipal .card-pro');
      tarjetas.forEach(t => {
        const contenido = t.innerText.toLowerCase();
        if (contenido.includes(texto)) t.style.display = '';
        else t.style.display = 'none';
      });
    }

    function pedirInstruccionDepto(idCoche, depto) {
      const titulo = depto === 'taller' ? '⚙️ Orden Taller' : '📦 Orden Recambios';
      Swal.fire({
        title: titulo,
        html: `
          <input type="text" id="instruccionInput" class="swal2-input" placeholder="Instrucciones o Nº de Orden..." style="border-radius: 1rem; font-size: 14px;">
          <div class="mt-6 text-left border border-gray-200 p-4 rounded-2xl bg-gray-50 shadow-inner">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="ph-fill ph-file-pdf text-red-500 text-lg"></i> Adjuntar Documento PDF (Opcional)</label>
            <input type="file" id="parteInput" accept=".pdf,image/*" class="w-full text-sm font-medium file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-white file:text-vw-blue file:shadow-sm hover:file:bg-gray-50 transition-colors cursor-pointer border border-gray-200 rounded-xl bg-white p-1">
          </div>
        `,
        showCancelButton: true, confirmButtonColor: '#001e50', confirmButtonText: 'Procesar Orden', cancelButtonText: 'Cancelar', customClass: { popup: 'rounded-[2rem]' },
        preConfirm: () => { 
          return {
            instruccion: document.getElementById('instruccionInput').value,
            archivo: document.getElementById('parteInput').files[0]
          };
        }
      }).then((result) => {
        if (result.isConfirmed) { 
          const datos = result.value;
          if (datos.archivo) {
            subirArchivoYEnviar(idCoche, depto, datos.instruccion, datos.archivo);
          } else {
            mandarDepto(idCoche, depto, datos.instruccion); 
          }
        }
      });
    }

    // ==========================================
    // MOTOR DE ENVÍO A DRIVE
    // ==========================================
    async function subirArchivoYEnviar(idCoche, depto, instruccion, archivo) {
      Swal.fire({ title: 'Procesando Archivo...', text: 'Transfiriendo documento al servidor seguro.', allowOutsideClick: false, didOpen: () => Swal.showLoading(), customClass: { popup: 'rounded-[2rem]' } });
      
      const reader = new FileReader();
      reader.readAsDataURL(archivo);
      
      reader.onload = async () => {
        const base64Data = reader.result;
        
        // 🔥 ¡CAMBIA ESTA URL POR LA TUYA! 🔥
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxec72BCUB3fA_ZtBAe8Zs7dqE00MScDbCGSqeQguIVHlH6S8q0vqNBbtGwk_1vPeNYjw/exec'; 
        
        try {
          const response = await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ base64: base64Data, fileName: archivo.name, mimeType: archivo.type })
          });
          
          const data = await response.json();
          
          if (data.status === 'success') {
            const fileUrl = data.url;
            
            const refDoc = window.doc(window.db, "vehiculos", idCoche);
            const updateData = depto === 'taller' 
              ? { enTaller: true, ordenTaller: instruccion, urlParte: fileUrl }
              : { enRecambios: true, ordenRecambios: instruccion, urlParte: fileUrl };
              
            await window.updateDoc(refDoc, updateData);
            Swal.fire({ icon: 'success', title: 'Operación Completada', showConfirmButton: false, timer: 1500, customClass: { popup: 'rounded-[2rem]' } });
          } else {
            throw new Error(data.message);
          }
        } catch (e) {
          Swal.fire({ icon: 'error', title: 'Error de Transferencia', text: e.message, customClass: { popup: 'rounded-[2rem]' } });
        }
      };
    }

    async function mandarDepto(idCoche, depto, instruccion) {
      try {
        const ref = window.doc(window.db, "vehiculos", idCoche);
        if (depto === 'taller') await window.updateDoc(ref, { enTaller: true, ordenTaller: instruccion });
        else await window.updateDoc(ref, { enRecambios: true, ordenRecambios: instruccion });
        Swal.fire({ icon: 'success', title: 'Actualizado', showConfirmButton: false, timer: 1000, customClass: { popup: 'rounded-[2rem]' } });
      } catch (e) { mostrarError('Error de red al actualizar.'); }
    }

    function obtenerBurbujaChat(chatRaw) {
      if (!chatRaw || chatRaw === "[]") return '';
      try {
        let chatData = JSON.parse(decodeURIComponent(chatRaw));
        let history = chatData.history || chatData; 
        let lastOpened = chatData.lastOpened ? (chatData.lastOpened[userRole.toUpperCase()] || 0) : 0;
        let noLeidos = history.filter(msg => msg.fecha > lastOpened && msg.rol.toUpperCase() !== userRole.toUpperCase()).length;
        return noLeidos > 0 ? `<span class="absolute -top-2 -right-2 bg-red-500 border-[3px] border-white text-white text-[10px] font-bold w-6 h-6 flex items-center justify-center rounded-full shadow-md animate-bounce">${noLeidos}</span>` : '';
      } catch(e) { return ''; }
    }

    function renderCocheGlobal(c) {
      let chatJson = encodeURIComponent(c.chat || "[]");
      let modSafe = encodeURIComponent(c.C || "");
      let matSafe = encodeURIComponent(c.B || "");
      let basSafe = encodeURIComponent(c.A || ""); 
      let burbuja = obtenerBurbujaChat(c.chat);
      
      let uiTaller = c.finTaller ? `<span class="text-[10px] font-bold text-emerald-700 bg-emerald-100 border border-emerald-200 px-3 py-1.5 rounded-lg shadow-sm">✅ Terminado</span>` : 
                     c.enTaller ? `<span class="text-[10px] font-bold text-amber-700 bg-amber-100 border border-amber-200 px-3 py-1.5 rounded-lg shadow-sm">⏳ En curso</span>` : 
                     `<button onclick="pedirInstruccionDepto('${c.fila}', 'taller')" class="text-[11px] font-bold bg-white border border-gray-300 text-gray-700 px-4 py-1.5 rounded-lg shadow-sm hover:bg-gray-50 transition-all flex items-center gap-1"><i class="ph-bold ph-arrow-right"></i> Solicitar</button>`;
                     
      let uiRecambios = c.finRecambios ? `<span class="text-[10px] font-bold text-emerald-700 bg-emerald-100 border border-emerald-200 px-3 py-1.5 rounded-lg shadow-sm">✅ Terminado</span>` : 
                        c.enRecambios ? `<span class="text-[10px] font-bold text-amber-700 bg-amber-100 border border-amber-200 px-3 py-1.5 rounded-lg shadow-sm">⏳ En curso</span>` : 
                        `<button onclick="pedirInstruccionDepto('${c.fila}', 'recambios')" class="text-[11px] font-bold bg-white border border-gray-300 text-gray-700 px-4 py-1.5 rounded-lg shadow-sm hover:bg-gray-50 transition-all flex items-center gap-1"><i class="ph-bold ph-arrow-right"></i> Solicitar</button>`;

      let botonParteTaller = c.urlParte ? `<a href="${c.urlParte}" target="_blank" class="mt-2 inline-flex items-center gap-1.5 text-[11px] font-bold text-red-600 bg-white hover:bg-red-50 border border-red-200 px-3 py-1.5 rounded-lg shadow-sm transition-all"><i class="ph-fill ph-file-pdf text-sm"></i> Doc. Anexo</a>` : '';
      
      let infoTallerAdicional = (c.ordenTaller || c.fechaTaller || c.urlParte) ? 
        `<div class="text-xs text-gray-500 mt-2">Orden: <span class="font-bold text-gray-800">${c.ordenTaller || '-'}</span> | Cita: <span class="font-bold text-gray-800">${c.fechaTaller || '-'}</span><br>${botonParteTaller}</div>` : '';
        
      let infoRecambiosAdicional = (c.ordenRecambios || c.fechaRecambios || c.urlParte) ? 
        `<div class="text-xs text-gray-500 mt-2">Orden: <span class="font-bold text-gray-800">${c.ordenRecambios || '-'}</span> | Cita: <span class="font-bold text-gray-800">${c.fechaRecambios || '-'}</span><br>${botonParteTaller}</div>` : '';

      return `
      <div class="card-pro p-6">
        <div class="flex justify-between items-start mb-4">
          <div>
            <h3 class="text-lg font-bold text-gray-900 tracking-tight leading-tight">${c.C}</h3>
            <div class="flex items-center gap-2 mt-2">
              <span class="inline-block bg-gray-100 text-gray-700 text-xs font-bold px-3 py-1 rounded-md border border-gray-200 shadow-inner tracking-wider">${c.B}</span>
            </div>
          </div>
          <div class="flex gap-2">
             <button onclick="imprimirEtiqueta('${modSafe}', '${matSafe}', '${basSafe}')" class="w-10 h-10 bg-gray-50 border border-gray-200 text-gray-600 hover:bg-white hover:text-vw-blue hover:border-vw-blue rounded-xl transition-all shadow-sm flex items-center justify-center">
               <i class="ph-bold ph-printer text-xl"></i>
             </button>
             <button onclick="abrirChat('${c.fila}', '${modSafe}', '${matSafe}', '${chatJson}')" class="relative w-10 h-10 bg-blue-50 border border-blue-100 text-vw-blue hover:bg-vw-blue hover:text-white rounded-xl transition-all shadow-sm flex items-center justify-center">
               <i class="ph-fill ph-chat-teardrop-text text-xl"></i> ${burbuja}
             </button>
          </div>
        </div>
        
        <p class="text-[11px] text-gray-500 font-bold uppercase tracking-widest mb-4 bg-gray-50 inline-block px-3 py-1.5 rounded-lg border border-gray-100">VIN: <span class="text-gray-800">${c.A}</span></p>
        
        <div class="grid grid-cols-2 gap-3 mb-5">
          <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 shadow-inner">
             <span class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Estado de Entrega</span>
             <span class="text-sm font-bold ${c.estado ? 'text-vw-blue' : 'text-gray-400 italic'}">${c.estado || 'No definido'}</span>
          </div>
          <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 shadow-inner">
             <span class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Fecha Programada</span>
             <span class="text-sm font-bold text-gray-800">${c.fechaCita || '--/--/----'}</span>
          </div>
        </div>

        <div class="space-y-3 border-t border-gray-100 pt-5">
           <div class="flex justify-between items-center bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow">
              <div>
                 <span class="text-xs font-bold text-gray-900 uppercase flex items-center gap-1.5 tracking-wider"><div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center"><i class="ph-fill ph-wrench text-gray-600"></i></div> Taller</span>
                 ${infoTallerAdicional}
              </div>
              <div class="flex flex-col items-end">${uiTaller}</div>
           </div>
           <div class="flex justify-between items-center bg-white border border-gray-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow">
              <div>
                 <span class="text-xs font-bold text-gray-900 uppercase flex items-center gap-1.5 tracking-wider"><div class="w-6 h-6 rounded-full bg-gray-100 flex items-center justify-center"><i class="ph-fill ph-package text-gray-600"></i></div> Piezas</span>
                 ${infoRecambiosAdicional}
              </div>
              <div class="flex flex-col items-end">${uiRecambios}</div>
           </div>
        </div>
      </div>`;
    }

    function renderTarjetaActiva(c, prefijo, info, tipo) {
      let chatJson = encodeURIComponent(c.chat || "[]");
      let modSafe = encodeURIComponent(c.C || "");
      let matSafe = encodeURIComponent(c.B || "");
      let burbuja = obtenerBurbujaChat(c.chat);
      let botonParte = c.urlParte ? `<a href="${c.urlParte}" target="_blank" class="mt-3 inline-flex items-center gap-2 text-[12px] font-bold text-red-600 bg-white hover:bg-red-50 border border-red-200 px-4 py-2 rounded-xl shadow-sm transition-all"><i class="ph-fill ph-file-pdf text-lg"></i> Ver Documento Adjunto</a>` : '';

      return `
      <div class="card-pro p-8 border-t-8 ${tipo === 'Taller' ? 'border-t-amber-400' : 'border-t-vw-light'}">
        <div class="flex justify-between items-start mb-6">
           <div>
             <h3 class="text-2xl font-bold text-gray-900 tracking-tight">${c.C}</h3>
             <div class="mt-2 flex gap-3 items-center">
                 <span class="inline-block bg-gray-100 text-gray-700 text-sm font-bold px-4 py-1.5 rounded-lg border border-gray-200 shadow-inner tracking-widest">${c.B}</span>
                 <span class="text-xs text-gray-500 uppercase font-bold tracking-widest">VIN: ${c.A}</span>
             </div>
           </div>
           <button onclick="abrirChat('${c.fila}', '${modSafe}', '${matSafe}', '${chatJson}')" class="relative flex items-center gap-2 px-5 py-2.5 bg-blue-50 text-vw-blue hover:bg-vw-blue hover:text-white rounded-xl text-sm font-bold shadow-sm transition-all">
             <i class="ph-fill ph-chat-teardrop-text text-xl"></i> Mensajes ${burbuja}
           </button>
        </div>
        
        <div class="bg-gray-50 p-6 rounded-2xl mb-6 border border-gray-200 shadow-inner">
          <p class="text-[11px] text-gray-500 uppercase font-bold tracking-widest mb-2"><i class="ph-bold ph-clipboard-text mr-1"></i> Detalles de la Orden</p>
          <p class="text-base font-medium text-gray-900">${info}</p>
          ${botonParte}
        </div>

        <div class="flex gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
          <div class="w-1/3">
             <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Ref. Orden</label>
             <input type="text" id="o-${prefijo}-${c.fila}" value="${c.ordenTaller || c.ordenRecambios || ''}" placeholder="Ej. OR-123" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold text-gray-700 focus:ring-2 focus:ring-vw-light focus:bg-white outline-none transition-all">
          </div>
          <div class="w-1/3">
             <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Fecha Prevista</label>
             <input type="date" id="f-${prefijo}-${c.fila}" value="${c.fechaTaller || c.fechaRecambios || ''}" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold text-gray-700 focus:ring-2 focus:ring-vw-light focus:bg-white outline-none transition-all">
          </div>
          <div class="w-1/3 flex flex-col justify-end gap-2">
              <div class="flex gap-2">
                 <button onclick="ejecutarAccion('${tipo}', '${c.fila}', false)" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl text-xs transition-colors border border-gray-200">Guardar</button>
                 <button onclick="ejecutarAccion('${tipo}', '${c.fila}', true)" class="flex-[2] bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm shadow-md transition-all flex items-center justify-center gap-2">
                   <i class="ph-bold ph-check-circle text-lg"></i> Finalizar
                 </button>
              </div>
          </div>
        </div>
      </div>`;
    }

    function renderAlertaUI(a) {
      // Reutiliza la misma estructura mejorada del global, con un marco de color distinto
      let baseHtml = renderCocheGlobal(a);
      let colorMarco = a.statusTag ? 'border-amber-400' : 'border-red-500';
      let tagBg = a.statusTag ? 'bg-amber-100 text-amber-800 border-amber-200' : 'bg-red-100 text-red-800 border-red-200';
      
      return baseHtml.replace('card-pro p-6', `card-pro p-6 border-l-8 ${colorMarco} relative`).replace('<h3', `<div class="absolute top-4 right-4"><span class="text-[10px] font-bold px-3 py-1.5 rounded-lg border uppercase shadow-sm tracking-widest ${tagBg}">${a.statusTag || 'RIESGO CRÍTICO'}</span></div><h3`);
    }

    async function ejecutarAccion(tipo, idCoche, esFinalizar) {
      const prefijo = tipo === 'Taller' ? 'p' : 'r';
      const orden = document.getElementById(`o-${prefijo}-${idCoche}`).value;
      const fecha = document.getElementById(`f-${prefijo}-${idCoche}`).value;

      try {
        const ref = window.doc(window.db, "vehiculos", idCoche);
        if (tipo === 'Taller') {
          await window.updateDoc(ref, { ordenTaller: orden, fechaTaller: fecha, finTaller: esFinalizar });
        } else {
          await window.updateDoc(ref, { ordenRecambios: orden, fechaRecambios: fecha, finRecambios: esFinalizar });
        }
        Swal.fire({ icon: 'success', title: 'Registro Guardado', showConfirmButton: false, timer: 1000, customClass: { popup: 'rounded-[2rem]' } });
      } catch (e) { mostrarError('Error al sincronizar con la base de datos.'); }
    }

    function imprimirEtiqueta(modelo, matricula, bastidor) {
      const ventana = window.open('', '_blank', 'width=450,height=350');
      ventana.document.write(`
        <html>
          <head>
            <title>Etiqueta Vehículo</title>
            <style>
              body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; display: flex; justify-content: center; align-items: center; background: #fff; }
              .etiqueta { border: 3px solid #001e50; padding: 20px; width: 350px; text-align: center; border-radius: 10px; }
              .titulo { font-size: 24px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; color: #001e50; letter-spacing: 2px; }
              .dato { margin: 15px 0; border-top: 2px dashed #eee; padding-top: 10px; }
              .label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
              .val { font-size: 22px; font-weight: bold; color: #000; }
            </style>
          </head>
          <body>
            <div class="etiqueta">
              <div class="titulo">VW WAGEN</div>
              <div class="dato"><div class="label">Modelo</div><div class="val">${decodeURIComponent(modelo)}</div></div>
              <div class="dato"><div class="label">Matrícula</div><div class="val">${decodeURIComponent(matricula)}</div></div>
              <div class="dato"><div class="label">Nº Bastidor</div><div class="val" style="font-size: 16px; letter-spacing: 1px;">${decodeURIComponent(bastidor)}</div></div>
            </div>
            <script>window.onload = function() { window.print(); window.close(); }<\/script>
          </body>
        </html>
      `);
      ventana.document.close();
    }

    async function abrirChat(idCoche, modeloEnc, matriculaEnc, chatJsonEncoded) {
      document.getElementById('chatFilaActiva').value = idCoche;
      document.getElementById('chatSubtitulo').innerText = `${decodeURIComponent(modeloEnc)} [${decodeURIComponent(matriculaEnc)}]`;
      
      let chatData = [];
      let chatObj = { history: [], lastOpened: { TALLER: 0, RECAMBIOS: 0, ENTREGAS: 0 } };
      
      try { 
        if (chatJsonEncoded && chatJsonEncoded !== "null" && chatJsonEncoded !== "%5B%5D") {
            let decoded = JSON.parse(decodeURIComponent(chatJsonEncoded));
            chatObj = decoded.history ? decoded : { history: decoded, lastOpened: {} };
            chatData = chatObj.history;
        }
      } catch(e) {}

      chatObj.lastOpened[userRole.toUpperCase()] = new Date().getTime();
      const ref = window.doc(window.db, "vehiculos", idCoche);
      window.updateDoc(ref, { chat: JSON.stringify(chatObj) }).catch(e=>console.log(e));
      
      dibujarMensajes(chatData);
      document.getElementById('chatModal').classList.remove('hidden');
    }

    function cerrarChat() { document.getElementById('chatModal').classList.add('hidden'); }

    function dibujarMensajes(historial) {
      const container = document.getElementById('chatMessages');
      if (!historial || historial.length === 0) {
        container.innerHTML = `<div class="m-auto text-center text-gray-400"><div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph-fill ph-chats-teardrop text-3xl text-gray-300"></i></div><p class="text-sm font-bold tracking-wide">Inicia la conversación</p></div>`; 
        return;
      }
      container.innerHTML = historial.map(msg => {
        const rolMensaje = msg.rol || "SISTEMA";
        const isMe = rolMensaje.toLowerCase() === userRole.toLowerCase();
        return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
            <span class="text-[10px] font-bold text-gray-400 mb-1.5 ml-1 tracking-widest">${rolMensaje}</span>
            <div class="max-w-[85%] px-5 py-3 rounded-2xl text-sm font-medium shadow-sm ${isMe ? 'bg-vw-blue text-white rounded-tr-sm' : 'bg-gray-100 text-gray-800 rounded-tl-sm border border-gray-200'}">${msg.texto}</div>
          </div>`;
      }).join('');
      setTimeout(() => container.scrollTop = container.scrollHeight, 50);
    }

    async function enviarMensajeChat() {
      const input = document.getElementById('chatInput');
      const idCoche = document.getElementById('chatFilaActiva').value;
      const mensaje = input.value.trim();

      if (!idCoche || mensaje === "") return;
      input.disabled = true; input.value = "Transmitiendo...";

      try {
        const ref = window.doc(window.db, "vehiculos", idCoche);
        const docSnap = await window.getDoc(ref);
        let chatAct = docSnap.data().chat || "[]";
        
        let chatObj = { history: [], lastOpened: { TALLER: 0, RECAMBIOS: 0, ENTREGAS: 0 } };
        try { 
            let dec = JSON.parse(chatAct);
            chatObj = dec.history ? dec : { history: dec, lastOpened: {} }; 
        } catch(e) {}

        chatObj.history.push({ rol: userRole.toUpperCase(), fecha: new Date().getTime(), texto: mensaje });
        chatObj.lastOpened[userRole.toUpperCase()] = new Date().getTime();

        await window.updateDoc(ref, { chat: JSON.stringify(chatObj) });
        input.disabled = false; input.value = "";
        dibujarMensajes(chatObj.history);
      } catch(e) {
        input.disabled = false; input.value = mensaje;
        mostrarError('Error de red, no se pudo enviar.');
      }
    }
  </script>
</body>
</html>
