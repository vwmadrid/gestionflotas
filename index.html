  <style>
    body { background-color: var(--vw-bg); }
    
    .card-mini { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; transition: all 0.2s; display: flex; flex-direction: column; }

    .status-btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; padding: 6px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; width: 100%; }

    .wa-other { background-color: #ffffff; border-top-left-radius: 0; }

<body class="text-gray-800 antialiased h-screen flex overflow-hidden">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-sm border-t-8 border-vw-blue text-center">

    <div class="p-6 border-b border-white/10">
      <h2 class="text-2xl font-black tracking-tighter">Castellana Wagen M-40</h2>
      <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Portal Entregas</p>
    </div>
    <nav id="tabsEntregas" class="hidden flex-col p-4 gap-2 flex-1">

      <button onclick="cambiarPestana('agenda')" class="p-3 text-gray-300 hover:bg-white/5 rounded-xl font-bold text-sm text-left flex items-center gap-2 transition-all"><i class="ph-bold ph-calendar-plus text-lg"></i> Citas Programadas</button>

    <div class="p-6 bg-black/20 mt-auto">

      <button onclick="cerrarSesion()" class="mt-4 text-xs text-red-400 hover:text-red-300 font-bold flex items-center gap-1 p-2 rounded-lg hover:bg-red-500/10 transition-colors"><i class="ph-bold ph-power"></i> Cerrar Sesión</button>

  <main class="flex-1 flex flex-col relative" id="mainApp" style="display:none;">
    <header class="bg-white border-b border-gray-200 flex flex-col px-8 py-5 shadow-sm shrink-0 gap-4 z-10" id="mainHeader">
      <div class="flex items-center justify-between">
         <div class="relative w-full max-w-lg">
             <i class="ph-bold ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
             <input type="text" id="buscadorInput" onkeyup="filtrarCoches()" placeholder="Buscar Bastidor, Matrícula o Modelo..." class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none focus:bg-white focus:ring-2 focus:ring-vw-light transition-all shadow-inner">
         </div>
         
         <button id="btnAnadirCoche" onclick="abrirLectorPDF()" class="hidden bg-vw-blue hover:bg-blue-900 text-white px-5 py-3 rounded-xl text-sm font-bold flex items-center gap-2 shadow-md transition-colors border border-blue-800">
            <i class="ph-bold ph-scan"></i> Escanear PDF
         </button>
      </div>
      
      <div id="filtrosVisuales" class="hidden flex gap-2 overflow-x-auto pb-1 mt-1">
         <button onclick="aplicarFiltroVisual('todos', this)" class="filtro-btn bg-gray-800 text-white border border-gray-800 px-5 py-2 rounded-xl text-xs font-bold shadow-sm transition-all">Todos (<span id="c-todos">0</span>)</button>
         <button onclick="aplicarFiltroVisual('listos', this)" class="filtro-btn bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all"><i class="ph-fill ph-check-circle text-emerald-500 text-sm"></i> Listos (<span id="c-listos">0</span>)</button>
         <button onclick="aplicarFiltroVisual('taller', this)" class="filtro-btn bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all"><i class="ph-fill ph-wrench text-amber-500 text-sm"></i> Taller (<span id="c-taller">0</span>)</button>
         <button onclick="aplicarFiltroVisual('recambios', this)" class="filtro-btn bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all"><i class="ph-fill ph-package text-teal-500 text-sm"></i> Recambios (<span id="c-recambios">0</span>)</button>
         <button onclick="aplicarFiltroVisual('alerta', this)" class="filtro-btn bg-red-50 text-red-700 border border-red-200 hover:bg-red-100 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all"><i class="ph-fill ph-warning text-red-600 text-sm"></i> Alertas (<span id="c-alerta">0</span>)</button>
      </div>
    </header>
    
    <div class="flex-1 overflow-y-auto p-8">
      <div id="contenedorPrincipal" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
      <div id="contenedorAgenda" class="hidden max-w-4xl mx-auto space-y-4"></div>
    </div>
  </main>

  <input type="file" id="inputUploadPDF" accept=".pdf" multiple class="hidden" onchange="procesarPDFs(event)">

  <div id="chatModal" class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl flex flex-col h-[550px] overflow-hidden">
      <div class="px-4 py-3 bg-[#075e54] text-white flex items-center justify-between shadow-md z-10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center"><i class="ph-fill ph-car text-xl"></i></div>
          <div class="leading-tight">
            <h3 class="font-bold text-sm" id="chatTituloCoche">Modelo</h3>
            <p id="chatSubtitulo" class="text-[11px] text-white/80 font-medium"></p>
          </div>
        </div>
        <button onclick="cerrarChat()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i class="ph-bold ph-x"></i></button>
      </div>
      <div id="chatMessages" class="p-4 flex-grow overflow-y-auto bg-whatsapp space-y-3 flex flex-col"></div>
      <div class="p-3 bg-[#f0f0f0] flex gap-2 items-center">
        <input type="hidden" id="chatFilaActiva">
        <input type="text" id="chatInput" placeholder="Escribe un mensaje" class="flex-grow px-4 py-3 bg-white border-transparent rounded-full outline-none text-sm shadow-sm focus:ring-1 focus:ring-gray-300">
        <button onclick="enviarMensajeChat()" class="w-12 h-12 bg-[#128c7e] text-white rounded-full shadow-sm flex items-center justify-center hover:bg-[#0b5c53] transition-colors"><i class="ph-fill ph-paper-plane-right text-lg"></i></button>
      </div>
    </div>

  <script>
    let userRole = ""; let activeTab = 'todos'; let unsubscribeFirebase = null; 
    let todosLosCoches = []; let filtroActual = 'todos';

    window.onload = function() {
      const rol = localStorage.getItem('vw_departamento');
      if (rol) { userRole = rol; document.getElementById('userRole').value = rol; iniciarAppDirectamente(rol); }
    };

    function iniciar() {
      userRole = document.getElementById('userRole').value;
      const pass = document.getElementById('userPass').value;
      const pwd = { 'taller': 'taller2026', 'recambios': 'piezas2026', 'entregas': 'vw2026' };
      if (pass !== pwd[userRole]) { Swal.fire('Error', 'Clave incorrecta', 'error'); return; }
      localStorage.setItem('vw_departamento', userRole); iniciarAppDirectamente(userRole);
    }

    function iniciarAppDirectamente(rol) {
      document.getElementById('roleBadge').innerText = rol;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('sidebarApp').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'flex';
      
      if (rol === 'entregas') {
        document.getElementById('tabsEntregas').classList.replace('hidden', 'flex');
        document.getElementById('btnAnadirCoche').classList.remove('hidden');
        document.getElementById('filtrosVisuales').classList.replace('hidden', 'flex');
        cambiarPestana('todos');
      } else { 
        document.getElementById('contenedorPrincipal').style.display = 'grid';
        cargar(); 
      }
    }

    function cerrarSesion() { localStorage.removeItem('vw_departamento'); location.reload(); }

    function cambiarPestana(pestana) {
      activeTab = pestana;
      const botones = document.querySelectorAll('#tabsEntregas button');
      botones.forEach(b => { b.classList.remove('bg-white/10', 'text-white'); b.classList.add('text-gray-300'); });
      if (pestana === 'todos') botones[0].classList.add('bg-white/10', 'text-white');
      if (pestana === 'agenda') botones[1].classList.add('bg-white/10', 'text-white');

      if (pestana === 'agenda') {
        document.getElementById('contenedorPrincipal').style.display = 'none';
        document.getElementById('filtrosVisuales').style.display = 'none';
        document.getElementById('contenedorAgenda').style.display = 'block';
        document.getElementById('btnAnadirCoche').style.display = 'none';
      } else {
        document.getElementById('contenedorPrincipal').style.display = 'grid';
        document.getElementById('filtrosVisuales').style.display = 'flex';
        document.getElementById('contenedorAgenda').style.display = 'none';
        document.getElementById('btnAnadirCoche').style.display = 'flex';
      }
      cargar();
    }

    function cargar() {
      if(unsubscribeFirebase) unsubscribeFirebase();
      
      unsubscribeFirebase = window.onSnapshot(window.collection(window.db, "vehiculos"), (snapshot) => {
        todosLosCoches = [];
        snapshot.forEach(doc => { let c = doc.data(); c.fila = doc.id; c.A = c.bastidor || ""; c.B = c.matricula || ""; c.C = c.modelo || ""; todosLosCoches.push(c); });
        todosLosCoches.sort((a, b) => (b.creadoEn || 0) - (a.creadoEn || 0));

        if (userRole === 'taller') renderizarDepartamentos('taller');
        else if (userRole === 'recambios') renderizarDepartamentos('recambios');
        else if (userRole === 'entregas') {
          if (activeTab === 'todos') { actualizarContadoresFiltros(); renderizarEntregasVisual(); }
          else if (activeTab === 'agenda') renderAgenda();
        }
      });
    }

    // ==========================================
    // ESCÁNER PDF INTELIGENTE (MODELOS VW)
    // ==========================================
    function abrirLectorPDF() { document.getElementById('inputUploadPDF').click(); }

    async function procesarPDFs(evento) {
      const archivos = evento.target.files;
      if (!archivos || archivos.length === 0) return;
      
      Swal.fire({ title: 'Analizando Documentos...', html: 'Extrayendo Datos y Modelos...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      let cochesAñadidos = 0;
      // Diccionario de modelos VW para el escáner
      const vwModels = ["GOLF", "POLO", "TIGUAN", "T-ROC", "T-CROSS", "TAIGO", "PASSAT", "ARTEON", "TOUAREG", "ID.3", "ID.4", "ID.5", "ID.7", "ID. BUZZ", "CADDY", "CRAFTER", "MULTIVAN", "AMAROK", "TOURAN", "UP!"];

      for (let file of archivos) {
        try {
          const fileURL = URL.createObjectURL(file);
          const pdf = await pdfjsLib.getDocument(fileURL).promise;
          let textoCompleto = "";
          
          for (let i = 1; i <= pdf.numPages; i++) {
            const pagina = await pdf.getPage(i);
            const contenido = await pagina.getTextContent();
            textoCompleto += contenido.items.map(item => item.str).join(" ");
          }

          const regexBastidor = /\b[A-HJ-NPR-Z0-9]{17}\b/gi;
          const matchBastidor = textoCompleto.match(regexBastidor);
          const regexMatricula = /\b\d{4}\s?[B-DF-HJ-NP-TV-Z]{3}\b/gi;
          const matchMatricula = textoCompleto.match(regexMatricula);

          if (matchBastidor) {
             const bastidorEncontrado = matchBastidor[0].toUpperCase();
             const matriculaEncontrada = matchMatricula ? matchMatricula[0].replace(/\s/g, '').toUpperCase() : 'S/M';
             
             // Buscar modelo en el texto
             let modeloDetectado = "VW " + file.name.split('.')[0].substring(0, 10); // Fallback: Parte del nombre del archivo
             let textoUpper = textoCompleto.toUpperCase();
             for(let mod of vwModels) {
                 if(textoUpper.includes(mod)) {
                     modeloDetectado = "VW " + mod;
                     break;
                 }
             }
             
             await window.setDoc(window.doc(window.db, "vehiculos", bastidorEncontrado), {
                bastidor: bastidorEncontrado, matricula: matriculaEncontrada, modelo: modeloDetectado, creadoEn: new Date().getTime()
             });
             cochesAñadidos++;
          }
        } catch (error) { console.error("Error PDF", error); }
      }
      document.getElementById('inputUploadPDF').value = ""; 
      Swal.fire('¡Escaneo Listo!', `Se han detectado y añadido ${cochesAñadidos} vehículos.`, 'success');
    }

    // ==========================================
    // SISTEMA DE FILTROS Y MOTIVOS DE ALERTA
    // ==========================================
    function aplicarFiltroVisual(filtro, btnElement) {
       filtroActual = filtro;
       document.querySelectorAll('.filtro-btn').forEach(b => {
          b.className = "filtro-btn bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all";
       });
       btnElement.className = "filtro-btn bg-gray-800 text-white border border-gray-800 px-5 py-2 rounded-xl text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all";
       renderizarEntregasVisual();
    }

    // Calcula si es alerta y por qué
    function obtenerInfoAlerta(c) {
        let isAlert = false; let motivo = "";
        let enT = c.enTaller && !c.finTaller; let enR = c.enRecambios && !c.finRecambios;
        
        if (c.fechaCita && (enT || enR)) {
            isAlert = true; 
            motivo = `Tiene cita (${c.fechaCita}) y sigue retenido en ` + (enT ? "Taller" : "Recambios");
        } else if (c.estado && c.estado.toUpperCase().includes("RIESGO")) {
            isAlert = true; motivo = "Marcado con Riesgo de Entrega";
        } else if (enT && enR) {
            isAlert = true; motivo = "Bloqueado en Taller y Recambios simultáneamente";
        }
        return { isAlert, motivo };
    }

    function actualizarContadoresFiltros() {
       let lst = 0; let tll = 0; let rcb = 0; let alt = 0;
       todosLosCoches.forEach(c => {
          let enT = c.enTaller && !c.finTaller; let enR = c.enRecambios && !c.finRecambios;
          if (!enT && !enR) lst++; if (enT) tll++; if (enR) rcb++;
          if (obtenerInfoAlerta(c).isAlert) alt++;
       });
       document.getElementById('c-todos').innerText = todosLosCoches.length;
       document.getElementById('c-listos').innerText = lst;
       document.getElementById('c-taller').innerText = tll;
       document.getElementById('c-recambios').innerText = rcb;
       document.getElementById('c-alerta').innerText = alt;
    }

    function renderizarEntregasVisual() {
       let div = document.getElementById('contenedorPrincipal');
       let filtrados = todosLosCoches.filter(c => {
          let enT = c.enTaller && !c.finTaller; let enR = c.enRecambios && !c.finRecambios;
          if (filtroActual === 'todos') return true;
          if (filtroActual === 'listos') return !enT && !enR;
          if (filtroActual === 'taller') return enT;
          if (filtroActual === 'recambios') return enR;
          if (filtroActual === 'alerta') return obtenerInfoAlerta(c).isAlert;
          return true;
       });
       if (filtrados.length === 0) {
          div.innerHTML = `<div class="col-span-full bg-white p-12 rounded-2xl shadow-sm text-center border border-gray-200 mt-10"><i class="ph-fill ph-folder-open text-6xl text-gray-300 mb-4"></i><p class="text-gray-500 font-bold text-lg">Categoría vacía.</p></div>`;
          return;
       }
       div.innerHTML = filtrados.map(c => renderTarjetaCompacta(c)).join('');
    }

    // ==========================================
    // TARJETAS COMPACTAS (CON INFO RECUPERADA)
    // ==========================================
    function renderTarjetaCompacta(c) {
      let chatJson = encodeURIComponent(c.chat || "[]"); let mS = encodeURIComponent(c.C); let maS = encodeURIComponent(c.B);
      
      let infoAlerta = obtenerInfoAlerta(c);
      let borderAlerta = infoAlerta.isAlert && filtroActual === 'alerta' ? 'border-l-8 border-red-500 bg-red-50/20' : 'border-l-8 border-vw-blue';
      
      // Barra de progreso calculada (3 pasos: Ingreso -> Taller/Piezas Terminadas -> Listo)
      let pts = 0; let totalPts = 1; // Ingreso base
      if(c.enTaller) { totalPts++; if(c.finTaller) pts++; }
      if(c.enRecambios) { totalPts++; if(c.finRecambios) pts++; }
      if((!c.enTaller || c.finTaller) && (!c.enRecambios || c.finRecambios)) pts = totalPts; // Listo = 100%
      let pctProgreso = Math.round((pts/totalPts)*100);
      let colorProgreso = pctProgreso === 100 ? 'bg-emerald-500' : 'bg-vw-light';

      // Botones de estado interactivos
      let bTaller = c.finTaller ? `<span class="status-btn bg-emerald-100 text-emerald-800"><i class="ph-bold ph-check"></i> Taller OK</span>` : 
                    c.enTaller ? `<span class="status-btn bg-amber-100 text-amber-800"><i class="ph-bold ph-wrench"></i> Taller...</span>` : 
                    `<button onclick="pedirInst(this, '${c.fila}', 'taller')" class="status-btn bg-gray-100 text-gray-600 hover:bg-gray-200">Taller <i class="ph-bold ph-plus"></i></button>`;
                    
      let bRecambios = c.finRecambios ? `<span class="status-btn bg-emerald-100 text-emerald-800"><i class="ph-bold ph-check"></i> Piezas OK</span>` : 
                       c.enRecambios ? `<span class="status-btn bg-teal-100 text-teal-800"><i class="ph-bold ph-package"></i> Piezas...</span>` : 
                       `<button onclick="pedirInst(this, '${c.fila}', 'recambios')" class="status-btn bg-gray-100 text-gray-600 hover:bg-gray-200">Piezas <i class="ph-bold ph-plus"></i></button>`;

      // Recuperación de la información de taller/recambios (Fechas y Orden)
      let txtTallerInfo = (c.ordenTaller || c.fechaTaller) ? `<div class="text-[9px] bg-amber-50 text-amber-800 px-2 py-1 rounded mt-1 font-bold"><i class="ph-fill ph-wrench"></i> OR: ${c.ordenTaller||'-'} | Prev: ${c.fechaTaller||'-'}</div>` : '';
      let txtRecambiosInfo = (c.ordenRecambios || c.fechaRecambios) ? `<div class="text-[9px] bg-teal-50 text-teal-800 px-2 py-1 rounded mt-1 font-bold"><i class="ph-fill ph-package"></i> OR: ${c.ordenRecambios||'-'} | Prev: ${c.fechaRecambios||'-'}</div>` : '';

      // Mostrar cita muy visual
      let uiCita = c.fechaCita ? `<div class="bg-blue-100 text-blue-800 border border-blue-200 px-2 py-1 rounded-md font-black text-xs flex items-center gap-1 shadow-sm"><i class="ph-bold ph-calendar-check"></i> Cita: ${c.fechaCita}</div>` : '';

      return `
      <div class="card-mini ${borderAlerta} p-5">
        <div class="flex justify-between items-start mb-3 gap-2">
          <div class="min-w-0 pr-2">
            <h3 class="font-black text-gray-900 text-base truncate uppercase" title="${c.C}">${c.C}</h3>
            <p class="text-[10px] font-bold text-gray-400 mt-1 tracking-widest truncate">VIN: <span class="text-vw-blue">${c.A}</span></p>
          </div>
          <button onclick="abrirChat('${c.fila}', '${mS}', '${maS}', '${chatJson}')" class="w-10 h-10 flex-shrink-0 bg-[#25D366] text-white rounded-full flex items-center justify-center hover:bg-[#128C7E] shadow-sm"><i class="ph-fill ph-whatsapp-logo text-xl"></i></button>
        </div>
        
        <div class="flex items-center justify-between mb-4 mt-2">
           <span class="bg-gray-100 border border-gray-200 text-gray-800 px-2.5 py-1 rounded text-xs font-black tracking-widest shadow-inner">${c.B}</span>
           ${uiCita}
        </div>

        ${infoAlerta.isAlert && filtroActual === 'alerta' ? `<div class="bg-red-100 text-red-700 text-[10px] font-bold p-2 rounded-lg mb-3 flex items-start gap-1"><i class="ph-fill ph-warning-circle text-sm"></i> <span>${infoAlerta.motivo}</span></div>` : ''}

        <div class="w-full bg-gray-200 rounded-full h-1.5 mb-4">
          <div class="${colorProgreso} h-1.5 rounded-full transition-all duration-500" style="width: ${pctProgreso}%"></div>
        </div>

        <div class="flex flex-col gap-2 mt-auto">
          <div class="flex gap-2 w-full">
            <div class="w-1/2 flex flex-col">${bTaller} ${txtTallerInfo}</div>
            <div class="w-1/2 flex flex-col">${bRecambios} ${txtRecambiosInfo}</div>
          </div>
        </div>
      </div>`;
    }

    // ==========================================
    // RENDERIZADO TALLER Y RECAMBIOS (DOBLE BANDEJA)
    // ==========================================
    function renderizarDepartamentos(depto) {
       let divP = document.getElementById('contenedorPrincipal');
       let activos = todosLosCoches.filter(c => depto === 'taller' ? (c.enTaller && !c.finTaller) : (c.enRecambios && !c.finRecambios));
       let nuevos = activos.filter(c => depto === 'taller' ? !c.ordenTaller : !c.ordenRecambios);
       let enRep = activos.filter(c => depto === 'taller' ? c.ordenTaller : c.ordenRecambios);
       
       let icon = depto === 'taller' ? 'ph-wrench' : 'ph-package';
       let labelRep = depto === 'taller' ? 'En Reparación' : 'Solicitudes Activas';
       let p = depto === 'taller' ? 'p' : 'r';
       let propInfo = depto === 'taller' ? 'ordenTaller' : 'ordenRecambios';
       let Tipo = depto === 'taller' ? 'Taller' : 'Recambios';

       divP.innerHTML = `
         <div class="col-span-full mb-2"><h3 class="text-xl font-black flex items-center gap-2"><i class="ph-fill ph-tray-arrow-down text-vw-blue"></i> Ingresos Recientes</h3></div>
         ${nuevos.length ? nuevos.map(c => renderActiva(c, p, c[propInfo], Tipo)).join('') : '<p class="text-gray-400 text-sm font-bold col-span-full mb-6">Ningún ingreso nuevo.</p>'}
         
         <div class="col-span-full mb-2 mt-8 border-t border-gray-200 pt-6"><h3 class="text-xl font-black flex items-center gap-2"><i class="ph-fill ${icon} text-vw-blue"></i> ${labelRep}</h3></div>
         ${enRep.length ? enRep.map(c => renderActiva(c, p, c[propInfo], Tipo)).join('') : '<p class="text-gray-400 text-sm font-bold col-span-full">Sin gestiones activas.</p>'}
       `;
    }

    function renderActiva(c, pre, info, tipo) {
      let chatJson = encodeURIComponent(c.chat || "[]"); let mS = encodeURIComponent(c.C); let maS = encodeURIComponent(c.B);
      let bClass = tipo === 'Taller' ? 'border-t-4 border-amber-400' : 'border-t-4 border-teal-500';
      let btnRecambios = tipo === 'Taller' ? `<button onclick="pedirInst(this, '${c.fila}', 'recambios')" class="mt-3 w-full bg-gray-50 border border-gray-200 text-gray-600 font-bold py-2 rounded-lg text-[11px] hover:bg-gray-100 transition-colors uppercase flex items-center justify-center gap-1"><i class="ph-bold ph-share-network"></i> Derivar a Recambios</button>` : '';

      return `
      <div class="card-mini ${bClass} p-5 flex flex-col">
        <div class="flex justify-between items-start mb-3">
           <div class="min-w-0 pr-2">
             <h3 class="font-black text-lg text-gray-900 uppercase truncate" title="${c.C}">${c.C}</h3>
             <p class="text-[11px] font-bold text-gray-400 mt-1 tracking-widest truncate">VIN: <span class="text-gray-800">${c.A}</span></p>
           </div>
           <button onclick="abrirChat('${c.fila}', '${mS}', '${maS}', '${chatJson}')" class="w-10 h-10 flex-shrink-0 bg-[#25D366] text-white rounded-full flex items-center justify-center hover:bg-[#128C7E] shadow-sm"><i class="ph-fill ph-whatsapp-logo text-xl"></i></button>
        </div>
        
        <div class="bg-gray-50 p-3 rounded-lg mb-4 border border-gray-100 flex-grow">
          <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">Instrucciones</p>
          <p class="text-sm font-bold text-gray-800 line-clamp-3">${info || 'Ninguna instrucción inicial.'}</p>
          ${c.urlParte ? `<a href="${c.urlParte}" target="_blank" class="text-xs text-red-600 font-bold mt-2 inline-flex items-center gap-1"><i class="ph-bold ph-file-pdf"></i> Abrir PDF adjunto</a>` : ''}
        </div>

        <div class="space-y-3">
          <div class="flex gap-2">
             <div class="flex-1">
               <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Orden / Albarán</label>
               <input type="text" id="o-${pre}-${c.fila}" value="${c.ordenTaller || c.ordenRecambios || ''}" placeholder="Escribir..." class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold text-gray-700 outline-none focus:ring-1 focus:ring-vw-blue transition-all">
             </div>
             <div class="flex-1">
               <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Previsión Entrega</label>
               <input type="date" id="f-${pre}-${c.fila}" value="${c.fechaTaller || c.fechaRecambios || ''}" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-xs font-bold text-gray-700 outline-none focus:ring-1 focus:ring-vw-blue transition-all">
             </div>
          </div>
          <div class="flex gap-2">
            <button onclick="ejecutar('${tipo}', '${c.fila}', false)" class="flex-1 bg-gray-200 text-gray-800 font-bold py-2.5 rounded-lg text-[11px] hover:bg-gray-300 transition-colors uppercase">Guardar</button>
            <button onclick="ejecutar('${tipo}', '${c.fila}', true)" class="flex-[2] bg-emerald-500 text-white font-bold py-2.5 rounded-lg text-[11px] hover:bg-emerald-600 transition-colors uppercase flex items-center justify-center gap-1"><i class="ph-bold ph-check"></i> Finalizar Trabajo</button>
          </div>
          ${btnRecambios}
        </div>
      </div>`;
    }

    // ==========================================
    // AGENDA Y FUNCIONES AUXILIARES
    // ==========================================
    function renderAgenda() {
       let div = document.getElementById('contenedorAgenda');
       let conCita = todosLosCoches.filter(c => c.fechaCita);
       if(conCita.length === 0) { div.innerHTML = "<p class='text-center text-gray-500 font-bold mt-10'>No hay citas programadas.</p>"; return; }
       
       div.innerHTML = conCita.map(c => {
         let block = (c.enTaller && !c.finTaller) || (c.enRecambios && !c.finRecambios);
         let bd = block ? 'border-red-500 bg-red-50' : 'border-vw-blue bg-white';
         return `
         <div class="${bd} p-5 rounded-2xl shadow-sm border-l-8 flex justify-between items-center transition-all hover:shadow-md">
            <div>
              <p class="font-black text-lg uppercase">${c.C}</p>
              <p class="font-mono text-xs text-gray-500 mt-1">VIN: ${c.A}</p>
              ${block ? '<p class="text-[10px] font-bold text-red-600 bg-red-100 px-2 py-1 rounded-md mt-2 inline-flex items-center gap-1 uppercase"><i class="ph-fill ph-warning-circle"></i> Riesgo: En Taller/Piezas</p>' : ''}
            </div>
            <div class="text-right">
              <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Cita Cliente</p>
              <p class="font-black text-vw-blue text-2xl">${c.fechaCita}</p>
            </div>
         </div>`;
       }).join('');
    }

    function filtrarCoches() {
      const t = document.getElementById('buscadorInput').value.toLowerCase();
      document.querySelectorAll('#contenedorPrincipal .card-mini').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(t) ? '' : 'none';
      });
    }

    function pedirInst(btn, idCoche, depto) {
      Swal.fire({
        title: 'Enviar a ' + depto,
        html: `<input type="text" id="instInput" class="swal2-input" placeholder="Añadir Instrucción..."><br><input type="file" id="fileInput" class="mt-4 text-sm" accept=".pdf,image/*">`,
        showCancelButton: true, confirmButtonColor: '#001e50'
      }).then((result) => {
        if (result.isConfirmed) { 
          let ins = document.getElementById('instInput').value; let f = document.getElementById('fileInput').files[0];
          if(f) subirYEnviar(idCoche, depto, ins, f); else mandar(idCoche, depto, ins);
        }
      });
    }

    async function subirYEnviar(id, depto, ins, file) {
      Swal.fire({title: 'Procesando Documento...', didOpen: () => Swal.showLoading()});
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = async () => {
        const urlDrive = 'https://script.google.com/macros/s/AKfycbxec72BCUB3fA_ZtBAe8Zs7dqE00MScDbCGSqeQguIVHlH6S8q0vqNBbtGwk_1vPeNYjw/exec'; 
        try {
          const res = await fetch(urlDrive, { method: 'POST', body: JSON.stringify({ base64: reader.result, fileName: file.name, mimeType: file.type }) });
          const data = await res.json();
          let upd = depto === 'taller' ? { enTaller: true, ordenTaller: ins, urlParte: data.url } : { enRecambios: true, ordenRecambios: ins, urlParte: data.url };
          await window.updateDoc(window.doc(window.db, "vehiculos", id), upd);
          Swal.fire('Éxito', 'Enviado correctamente', 'success');
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
      };
    }

    async function mandar(id, depto, ins) {
      let upd = depto === 'taller' ? { enTaller: true, ordenTaller: ins } : { enRecambios: true, ordenRecambios: ins };
      await window.updateDoc(window.doc(window.db, "vehiculos", id), upd);
    }

    async function ejecutar(tipo, id, fin) {
      const p = tipo === 'Taller' ? 'p' : 'r';
      let upd = tipo === 'Taller' ? 
        { finTaller: fin, ordenTaller: document.getElementById(`o-${p}-${id}`).value, fechaTaller: document.getElementById(`f-${p}-${id}`).value } : 
        { finRecambios: fin, ordenRecambios: document.getElementById(`o-${p}-${id}`).value, fechaRecambios: document.getElementById(`f-${p}-${id}`).value };
      await window.updateDoc(window.doc(window.db, "vehiculos", id), upd);
      Swal.fire({ icon: 'success', title: fin ? 'Finalizado' : 'Guardado', showConfirmButton: false, timer: 1000 });
    }

    // ==========================================
    // CHAT WHATSAPP
    // ==========================================
    async function abrirChat(id, mod, mat, json) {
      document.getElementById('chatFilaActiva').value = id;
      document.getElementById('chatTituloCoche').innerText = decodeURIComponent(mod);
      document.getElementById('chatSubtitulo').innerText = "Matrícula: " + decodeURIComponent(mat);
      let obj = { history: [] };
      try { if (json && json !== "null") { let d = JSON.parse(decodeURIComponent(json)); obj = d.history ? d : { history: d }; } } catch(e) {}
      dibujarMsj(obj.history);
      document.getElementById('chatModal').classList.remove('hidden');
    }

    function cerrarChat() { document.getElementById('chatModal').classList.add('hidden'); }

    function dibujarMsj(hist) {
      const cont = document.getElementById('chatMessages');
      if (!hist || hist.length === 0) { cont.innerHTML = `<p class="text-center text-xs font-bold text-gray-500 mt-4 bg-white/50 p-2 rounded-lg mx-auto w-max shadow-sm">Los mensajes están cifrados.</p>`; return; }
      cont.innerHTML = hist.map(m => {
        const isMe = (m.rol || "").toUpperCase() === userRole.toUpperCase();
        let hStr = m.fecha ? new Date(m.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        let rStr = isMe ? '' : `<div class="text-[11px] font-bold text-[#075e54] mb-0.5">${m.rol}</div>`;
        return `<div class="wa-bubble ${isMe ? 'wa-me self-end' : 'wa-other self-start'}">${rStr}<div>${m.texto}</div><span class="wa-time">${hStr}</span></div>`;
      }).join('');
      setTimeout(() => cont.scrollTop = cont.scrollHeight, 50);
    }

    async function enviarMensajeChat() {
      const input = document.getElementById('chatInput'); const id = document.getElementById('chatFilaActiva').value; const txt = input.value.trim();
      if (!id || !txt) return; input.value = "";
      const ref = window.doc(window.db, "vehiculos", id);
      const snap = await window.getDoc(ref);
      let obj = { history: [] }; try { let d = JSON.parse(snap.data().chat || "[]"); obj = d.history ? d : { history: d }; } catch(e) {}
      obj.history.push({ rol: userRole.toUpperCase(), fecha: new Date().getTime(), texto: txt });
      await window.updateDoc(ref, { chat: JSON.stringify(obj) });
      dibujarMsj(obj.history);
    }
  </script>
</body>
</html>
