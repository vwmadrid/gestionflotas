  <script>
    let userRole = ""; let activeTab = 'logistica'; let modoVistaActual = 'tarjetas'; 
    let unsubscribeFirebase = null; let todosLosCoches = []; let filtroActual = 'todos';

    window.onload = function() {
      const rol = localStorage.getItem('vw_departamento');
      if (rol) { userRole = rol; document.getElementById('userRole').value = rol; iniciarAppDirectamente(rol); }
    };

    function iniciar() {
      userRole = document.getElementById('userRole').value;
      const pass = document.getElementById('userPass').value;
      const pwd = { 'taller': 'taller2026', 'recambios': 'piezas2026', 'entregas': 'vw2026' };
      
      if (pass !== pwd[userRole]) { Swal.fire('Error', 'Clave incorrecta', 'error'); return; }
      
      localStorage.setItem('vw_departamento', userRole); 
      iniciarAppDirectamente(userRole);
    }

    function iniciarAppDirectamente(rol) {
      document.getElementById('roleBadge').innerText = "Perfil: " + rol;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('sidebarApp').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'flex';
      
      if (rol === 'entregas') {
        document.getElementById('tabsEntregas').classList.replace('hidden', 'flex');
        document.getElementById('botonesAdd').classList.replace('hidden', 'flex');
        cambiarPestana('logistica');
      } else { 
        document.getElementById('contenedorTarjetas').style.display = 'grid';
        cargar(); 
      }
    }

    function cerrarSesion() { localStorage.removeItem('vw_departamento'); location.reload(); }

    function cambiarPestana(pestana) {
      activeTab = pestana;
      const botones = document.querySelectorAll('#tabsEntregas button');
      
      // Limpiamos estilos de todos los botones
      botones.forEach(b => { 
        b.classList.remove('bg-white/10', 'text-white', 'text-amber-300', 'bg-amber-500/10', 'border-amber-500/30', 'bg-red-500/10', 'border-red-500/50'); 
        if(b.innerText.includes('Auditoría')) b.classList.add('text-red-300', 'border-red-500/20');
        else b.classList.add('text-gray-300');
      });
      
      // Aplicamos estilo al botón activo
      if (pestana === 'logistica') botones[0].classList.add('text-amber-300', 'bg-amber-500/10', 'border-amber-500/30');
      else if (pestana === 'todos') botones[1].classList.add('bg-white/10', 'text-white');
      else if (pestana === 'agenda') botones[2].classList.add('bg-white/10', 'text-white');
      else if (pestana === 'entregados') botones[3].classList.add('bg-white/10', 'text-white');
      else if (pestana === 'auditoria') botones[4].classList.add('bg-red-500/10', 'text-red-200', 'border-red-500/50');

      // Ocultamos todo
      document.getElementById('contenedorLogistica').style.display = 'none';
      document.getElementById('contenedorTarjetas').style.display = 'none';
      document.getElementById('contenedorTabla').style.display = 'none';
      document.getElementById('contenedorAgenda').style.display = 'none';
      document.getElementById('contenedorAuditoria').style.display = 'none';
      
      document.getElementById('filtrosVisuales').style.display = 'none';
      document.getElementById('controlesVistaExcel').style.display = 'none';
      document.getElementById('botonesAdd').style.display = 'none';
      document.getElementById('buscadorInput').style.display = 'block';

      // Mostramos lo que toca
      if (pestana === 'logistica') {
        document.getElementById('contenedorLogistica').style.display = 'grid';
        document.getElementById('botonesAdd').style.display = 'flex';
      } else if (pestana === 'todos') {
        document.getElementById('controlesVistaExcel').style.display = 'flex';
        document.getElementById('filtrosVisuales').style.display = 'flex';
        cambiarModoVisualizacion(modoVistaActual);
      } else if (pestana === 'agenda') {
        document.getElementById('contenedorAgenda').style.display = 'block';
        document.getElementById('buscadorInput').style.display = 'none';
      } else if (pestana === 'entregados') {
        document.getElementById('contenedorTarjetas').style.display = 'grid';
      } else if (pestana === 'auditoria') {
        document.getElementById('contenedorAuditoria').style.display = 'block';
        document.getElementById('buscadorInput').style.display = 'none';
        renderAuditoria();
      }
      cargar();
    }

    function cambiarModoVisualizacion(modo) {
       modoVistaActual = modo;
       const btnT = document.getElementById('btnVistaTarjetas');
       const btnE = document.getElementById('btnVistaTabla');
       if (modo === 'tarjetas') {
          btnT.className = "bg-white text-[#001e50] border border-[#001e50] shadow-sm px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 transition-all";
          btnE.className = "text-gray-500 hover:text-gray-800 border border-transparent px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 transition-all";
          document.getElementById('contenedorTarjetas').style.display = 'grid';
          document.getElementById('contenedorTabla').style.display = 'none';
       } else {
          btnE.className = "bg-white text-[#001e50] border border-[#001e50] shadow-sm px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 transition-all";
          btnT.className = "text-gray-500 hover:text-gray-800 border border-transparent px-3 py-1.5 rounded text-xs font-bold flex items-center gap-1 transition-all";
          document.getElementById('contenedorTarjetas').style.display = 'none';
          document.getElementById('contenedorTabla').style.display = 'block';
       }
       renderizarVistas();
    }

    function aplicarFiltroVisual(filtro, btnElement) {
       filtroActual = filtro;
       document.querySelectorAll('.filtro-btn').forEach(b => {
          b.className = "filtro-btn bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 px-5 py-2 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all";
       });
       btnElement.className = "filtro-btn bg-[#001e50] text-white border border-[#001e50] px-5 py-2 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1.5 transition-all";
       renderizarVistas();
    }

    function calcularProgreso(c) {
        let pct = 20; 
        let enInventario = c.pasoAInventario !== false; 
        if (enInventario) pct += 20; 
        if (enInventario && (!c.enTaller || c.finTaller)) pct += 20;
        if (enInventario && (!c.enRecambios || c.finRecambios)) pct += 20;
        if (c.fechaCita) pct += 20; 
        if (pct > 100) pct = 100;
        if (c.entregado) pct = 100;

        let color = 'bg-red-500';
        if (pct >= 40) color = 'bg-orange-500';
        if (pct >= 60) color = 'bg-amber-400';
        if (pct >= 80) color = 'bg-[#00b0f0]';
        if (pct === 100) color = 'bg-emerald-500';
        return { pct, color };
    }

    function obtenerBurbujaChat(chatObj) {
      if (!chatObj || !chatObj.history) return '';
      let hs = chatObj.history;
      let lo = chatObj.lastOpened ? (chatObj.lastOpened[userRole.toUpperCase()] || 0) : 0;
      let nl = hs.filter(m => m.fecha > lo && m.rol.toUpperCase() !== userRole.toUpperCase()).length;
      if (nl > 0) return `<span class="absolute -top-2 -right-2 bg-red-500 border-2 border-white text-white text-[9px] font-bold w-5 h-5 flex items-center justify-center rounded-full shadow-md animate-pulse">${nl}</span>`;
      return '';
    }

    function cargar() {
      if(unsubscribeFirebase) unsubscribeFirebase();
      unsubscribeFirebase = window.onSnapshot(window.collection(window.db, "vehiculos"), (snapshot) => {
        todosLosCoches = [];
        snapshot.forEach(doc => { 
            let c = doc.data(); 
            c.fila = doc.id; 
            c.A = c.bastidor || "Sin Bastidor"; 
            c.B = c.matricula || c.Matricula || "S/M"; 
            c.C = c.modelo || "VW"; 
            
            let chatProcess = c.chatInfo;
            if (!chatProcess && c.chat && typeof c.chat === 'string') {
                try { chatProcess = JSON.parse(c.chat); } catch(e) {}
            }
            c.chatData = chatProcess || {history: [], lastOpened: {}};
            todosLosCoches.push(c); 
        });
        
        todosLosCoches.sort((a, b) => (b.creadoEn || 0) - (a.creadoEn || 0));

        if (userRole === 'taller' || userRole === 'recambios') {
           renderizarDepartamentos(userRole);
        } else if (userRole === 'entregas') {
          if (activeTab === 'logistica') renderLogistica();
          else if (activeTab === 'todos') { actualizarContadores(); renderizarVistas(); }
          else if (activeTab === 'agenda') renderAgenda();
          else if (activeTab === 'entregados') renderEntregados();
          else if (activeTab === 'auditoria') renderAuditoria();
        }
      });
    }

    function actualizarContadores() {
       let listos = 0, taller = 0, recambios = 0, alertas = 0, total = 0;
       todosLosCoches.forEach(c => {
          let enInventario = c.pasoAInventario !== false; 
          if(!c.entregado && enInventario) {
              total++;
              let enT = c.enTaller && !c.finTaller; let enR = c.enRecambios && !c.finRecambios;
              if (!enT && !enR) listos++; if (enT) taller++; if (enR) recambios++;
              if (c.fechaCita && (enT || enR)) alertas++;
          }
       });
       document.getElementById('c-todos').innerText = total; document.getElementById('c-listos').innerText = listos;
       document.getElementById('c-taller').innerText = taller; document.getElementById('c-recambios').innerText = recambios;
    }

    function renderLogistica() {
       let logistica = todosLosCoches.filter(c => c.pasoAInventario === false && !c.entregado);
       let div = document.getElementById('contenedorLogistica');
       
       if (logistica.length === 0) {
           div.innerHTML = `<div class="col-span-full bg-white p-12 rounded-xl shadow-sm text-center border border-gray-200 mt-6"><p class="text-gray-500 font-bold text-lg">No hay vehículos en fase de logística previa.</p></div>`;
       } else {
           div.innerHTML = logistica.map(c => {
               let btnDoc = c.fechaDoc ? `<div class="bg-emerald-100 text-emerald-800 text-[9px] font-bold py-1.5 px-2 rounded border border-emerald-200 text-center">✓ Doc: ${c.fechaDoc}</div>` : `<button onclick="marcarPaso('${c.fila}', 'fechaDoc')" class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-[9px] font-bold py-1.5 px-2 rounded w-full border border-gray-300">Documentación</button>`;
               let btnTrans = c.fechaTransporte ? `<div class="bg-emerald-100 text-emerald-800 text-[9px] font-bold py-1.5 px-2 rounded border border-emerald-200 text-center">✓ Trans: ${c.fechaTransporte}</div>` : `<button onclick="marcarPaso('${c.fila}', 'fechaTransporte')" class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-[9px] font-bold py-1.5 px-2 rounded w-full border border-gray-300">En Transporte</button>`;
               let btnPrep = c.fechaPreparacion ? `<div class="bg-amber-100 text-amber-800 text-[9px] font-bold py-1.5 px-2 rounded border border-amber-300 text-center">⚠️ Prep: ${c.fechaPreparacion}</div>` : `<button onclick="marcarPaso('${c.fila}', 'fechaPreparacion')" class="bg-gray-100 text-gray-600 hover:bg-gray-200 text-[9px] font-bold py-1.5 px-2 rounded w-full border border-gray-300">En Preparación</button>`;

               return `
               <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm fila-coche">
                 <h3 class="font-black text-lg text-[#001e50] uppercase">${c.C}</h3>
                 <p class="text-[10px] font-bold text-gray-400 tracking-widest mt-1">VIN: ${c.A} | MAT: ${c.B}</p>
                 <div class="grid grid-cols-3 gap-2 mt-4 mb-4">
                    ${btnDoc} ${btnTrans} ${btnPrep}
                 </div>
                 <button onclick="pasarAInventario('${c.fila}')" class="w-full bg-[#001e50] text-white font-bold py-3 rounded-lg text-xs hover:bg-blue-900 shadow-sm flex items-center justify-center gap-2">
                    <i class="ph-bold ph-check"></i> Marcar como "Listo para Entrega"
                 </button>
               </div>`;
           }).join('');
       }
    }

    async function marcarPaso(id, campo) {
        let update = {}; update[campo] = new Date().toLocaleDateString();
        await window.updateDoc(window.doc(window.db, "vehiculos", id), update);
    }

    async function pasarAInventario(id) {
        Swal.fire({
            title: '¿Recepcionar Vehículo?',
            text: "Pasará al Inventario Central y constará como Listo en el portal de Renting.",
            icon: 'question', showCancelButton: true, confirmButtonColor: '#001e50', confirmButtonText: 'Sí, Recepcionar'
        }).then(async (result) => {
            if (result.isConfirmed) {
                await window.updateDoc(window.doc(window.db, "vehiculos", id), { pasoAInventario: true, fechaRecepcionBase: new Date().toLocaleDateString() });
                Swal.fire('¡Recepcionado!', 'El vehículo ya está en el circuito principal.', 'success');
            }
        });
    }

    function renderizarVistas() {
       let activos = todosLosCoches.filter(c => !c.entregado && c.pasoAInventario !== false);
       let filtrados = activos.filter(c => {
          let enT = c.enTaller && !c.finTaller; let enR = c.enRecambios && !c.finRecambios;
          if (filtroActual === 'todos') return true;
          if (filtroActual === 'listos') return !enT && !enR;
          if (filtroActual === 'taller') return enT;
          if (filtroActual === 'recambios') return enR;
          if (filtroActual === 'alerta') return (c.fechaCita && (enT || enR));
          return true;
       });

       if (modoVistaActual === 'tarjetas') {
           let div = document.getElementById('contenedorTarjetas');
           if (filtrados.length === 0) {
               div.innerHTML = `<div class="col-span-full bg-white p-12 rounded-xl shadow-sm text-center border border-gray-200 mt-6"><p class="text-gray-500 font-bold text-lg">No hay vehículos en esta categoría.</p></div>`;
           } else {
               div.innerHTML = filtrados.map(c => renderTarjetaCompacta(c)).join('');
           }
       } else {
           renderTablaModoExcel(filtrados);
       }
    }

    function renderTablaModoExcel(datosFiltrados) {
       let contenedor = document.getElementById('contenedorTabla');
       if(datosFiltrados.length === 0){ contenedor.innerHTML = "<p class='text-center p-10 font-bold text-gray-500'>Sin resultados en esta categoría.</p>"; return; }
       
       let html = `
       <table class="tabla-excel whitespace-nowrap">
         <thead>
           <tr>
             <th>Progreso</th><th>Modelo</th><th>Matrícula</th><th>Bastidor</th><th>Renting</th><th>Agencia</th>
             <th>Taller</th><th>Instr. Taller</th><th>Nº Orden</th><th>Entrada Tall.</th><th>Prev. Tall.</th><th>Fin Tall.</th>
             <th>Recambios</th><th>Instr. Recambios</th><th>Nº Pedido</th><th>Entrada Rec.</th><th>Prev. Rec.</th><th>Fin Rec.</th>
             <th class="bg-[#00b0f0]">Cita Entrega</th><th>Gestión</th>
           </tr>
         </thead><tbody id="filasTablaExcel">`;

       datosFiltrados.forEach(c => {
          let mS = encodeURIComponent(c.C || ''); let maS = encodeURIComponent(c.B || ''); 
          let chatJson = encodeURIComponent(JSON.stringify(c.chatData || {history:[]}));
          let checkTaller = c.finTaller ? `<div class="excel-check check-fin">✓</div> FIN` : (c.enTaller ? `<div class="excel-check check-curso">X</div> CURSO` : `<div class="excel-check"></div> SOLICITAR`);
          let checkRecambios = c.finRecambios ? `<div class="excel-check check-fin">✓</div> FIN` : (c.enRecambios ? `<div class="excel-check check-curso">X</div> CURSO` : `<div class="excel-check"></div> SOLICITAR`);
          let prog = calcularProgreso(c);

          html += `
          <tr class="fila-coche hover:bg-[#e0f2fe]">
             <td class="text-center font-bold text-white ${prog.color}">${prog.pct}%</td>
             <td class="font-bold text-gray-900">${c.C}</td>
             <td class="font-bold bg-gray-50 text-center border-l border-r border-gray-200">${c.B}</td>
             <td class="font-mono text-gray-500 text-[10px]">${c.A}</td>
             <td class="cursor-pointer text-blue-600 hover:underline" onclick="editarRentingAgencia('${c.fila}', '${c.renting||''}', '${c.agencia||''}')">${c.renting || '-'}</td>
             <td class="cursor-pointer text-blue-600 hover:underline border-r border-gray-200" onclick="editarRentingAgencia('${c.fila}', '${c.renting||''}', '${c.agencia||''}')">${c.agencia || '-'}</td>

             <td class="cursor-pointer hover:bg-gray-100" onclick="pedirInst(this, '${c.fila}', 'taller')">${checkTaller}</td>
             <td class="text-gray-500 truncate max-w-[120px]" title="${c.instruccionTaller||''}">${c.instruccionTaller || '-'}</td>
             <td class="text-center font-bold text-gray-600">${c.ordenTaller || '-'}</td>
             <td class="text-center text-gray-400">${c.fechaEntradaTaller || '-'}</td>
             <td class="text-center text-gray-500">${c.fechaTaller || '-'}</td>
             <td class="text-center text-emerald-600 font-bold border-r border-gray-200">${c.fechaFinTaller || '-'}</td>
             
             <td class="cursor-pointer hover:bg-gray-100" onclick="pedirInst(this, '${c.fila}', 'recambios')">${checkRecambios}</td>
             <td class="text-gray-500 truncate max-w-[120px]" title="${c.instruccionRecambios||''}">${c.instruccionRecambios || '-'}</td>
             <td class="text-center font-bold text-gray-600">${c.ordenRecambios || '-'}</td>
             <td class="text-center text-gray-400">${c.fechaEntradaRecambios || '-'}</td>
             <td class="text-center text-gray-500">${c.fechaRecambios || '-'}</td>
             <td class="text-center text-emerald-600 font-bold border-r border-gray-200">${c.fechaFinRecambios || '-'}</td>
             
             <td class="font-bold text-[#001e50] text-center bg-blue-50">${c.fechaCita || '-'}</td>
             <td class="text-center flex items-center justify-center gap-3 pt-2 pb-2 px-2">
                <button onclick="abrirChat('${c.fila}', '${mS}', '${maS}', '${chatJson}')" class="text-[#25D366] hover:scale-110 relative"><i class="ph-fill ph-whatsapp-logo text-xl"></i>${obtenerBurbujaChat(c.chatData)}</button>
                <button onclick="marcarComoEntregado('${c.fila}')" class="text-gray-400 hover:text-emerald-600" title="Entregar"><i class="ph-bold ph-key text-xl"></i></button>
                <button onclick="borrarVehiculo('${c.fila}', '${c.C}')" class="text-red-400 hover:text-red-600" title="Eliminar vehículo">
    <i class="ph-bold ph-trash text-xl"></i>
</button>
                </td>
          </tr>`;
       });
       html += `</tbody></table>`; contenedor.innerHTML = html;
    }

    function renderTarjetaCompacta(c) {
      let chatJson = encodeURIComponent(JSON.stringify(c.chatData || {history:[]})); 
      let mS = encodeURIComponent(c.C || ''); let maS = encodeURIComponent(c.B || '');
      let isAlerta = c.fechaCita && ((c.enTaller && !c.finTaller) || (c.enRecambios && !c.finRecambios));
      let borderAlerta = isAlerta ? 'border-l-8 border-red-500 bg-red-50/20' : 'border-l-8 border-[#001e50]';
      let prog = calcularProgreso(c);

      let bTaller = c.finTaller ? `<span class="status-btn bg-emerald-100 text-emerald-800"><i class="ph-bold ph-check"></i> Tall. OK</span>` : c.enTaller ? `<span class="status-btn bg-amber-100 text-amber-800"><i class="ph-bold ph-wrench"></i> Tall. Curso</span>` : `<button onclick="pedirInst(this, '${c.fila}', 'taller')" class="status-btn bg-gray-100 text-gray-600 hover:bg-gray-200 border border-gray-200 shadow-sm">Taller <i class="ph-bold ph-plus"></i></button>`;
      let bRecambios = c.finRecambios ? `<span class="status-btn bg-emerald-100 text-emerald-800"><i class="ph-bold ph-check"></i> Rec. OK</span>` : c.enRecambios ? `<span class="status-btn bg-teal-100 text-teal-800"><i class="ph-bold ph-package"></i> Rec. Curso</span>` : `<button onclick="pedirInst(this, '${c.fila}', 'recambios')" class="status-btn bg-gray-100 text-gray-600 hover:bg-gray-200 border border-gray-200 shadow-sm">Recambios <i class="ph-bold ph-plus"></i></button>`;

      let txtTallerInfo = c.enTaller ? `<div class="text-[9px] bg-amber-50 text-amber-800 px-2 py-1 rounded mt-1 font-bold">OR: ${c.ordenTaller||'Pte'} | Prev: ${c.fechaTaller||'Pte'}</div>` : '';
      let txtRecambiosInfo = c.enRecambios ? `<div class="text-[9px] bg-teal-50 text-teal-800 px-2 py-1 rounded mt-1 font-bold">Ped: ${c.ordenRecambios||'Pte'} | Prev: ${c.fechaRecambios||'Pte'}</div>` : '';

      return `
      <div class="card-mini ${borderAlerta} p-5 fila-coche">
        <div class="flex justify-between items-start mb-2 gap-2">
          <div class="min-w-0 pr-2">
            <h3 class="font-black text-base text-[#001e50] truncate uppercase">${c.C}</h3>
            <p class="text-[10px] font-bold text-gray-400 mt-0.5 tracking-widest truncate">VIN: ${c.A}</p>
          </div>
          <div class="flex gap-1 flex-shrink-0">
             <button onclick="abrirChat('${c.fila}', '${mS}', '${maS}', '${chatJson}')" class="w-8 h-8 relative bg-[#25D366] text-white rounded-full flex items-center justify-center hover:bg-[#128C7E] shadow-sm"><i class="ph-fill ph-whatsapp-logo text-lg"></i>${obtenerBurbujaChat(c.chatData)}</button>
             <button onclick="marcarComoEntregado('${c.fila}')" class="w-8 h-8 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-emerald-500 hover:text-white shadow-sm transition-colors"><i class="ph-bold ph-key text-lg"></i></button>
             <button onclick="borrarVehiculo('${c.fila}', '${c.C}')" class="w-8 h-8 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white shadow-sm transition-colors" title="Eliminar">
    <i class="ph-bold ph-trash text-lg"></i>
</button>      
             </div>
        </div>
        
        <div class="flex gap-2 mb-3">
            <button onclick="editarRentingAgencia('${c.fila}', '${c.renting||''}', '${c.agencia||''}')" class="text-[9px] bg-gray-50 border border-gray-200 text-gray-500 px-2 py-1 rounded font-bold hover:bg-gray-100 truncate flex-1 flex items-center gap-1"><i class="ph-bold ph-buildings"></i> ${c.renting || 'Renting'}</button>
            <button onclick="editarRentingAgencia('${c.fila}', '${c.renting||''}', '${c.agencia||''}')" class="text-[9px] bg-gray-50 border border-gray-200 text-gray-500 px-2 py-1 rounded font-bold hover:bg-gray-100 truncate flex-1 flex items-center gap-1"><i class="ph-bold ph-truck"></i> ${c.agencia || 'Agencia'}</button>
        </div>

        <div class="flex items-center justify-between mb-3">
           <span class="bg-gray-100 border border-gray-300 text-gray-800 px-2.5 py-1 rounded text-xs font-black tracking-widest shadow-sm">${c.B}</span>
           ${c.fechaCita ? `<div class="bg-blue-50 text-[#001e50] border border-blue-200 px-2 py-1 rounded font-black text-xs flex items-center gap-1"><i class="ph-bold ph-calendar-check"></i> Cita: ${c.fechaCita}</div>` : ''}
        </div>

        <div class="w-full bg-gray-200 rounded-full h-2 mb-3 relative overflow-hidden">
           <div class="${prog.color} h-2 transition-all duration-500" style="width: ${prog.pct}%"></div>
           <span class="absolute inset-0 flex items-center justify-center text-[7px] font-black text-gray-800 drop-shadow-md mix-blend-overlay">${prog.pct}%</span>
        </div>

        <div class="flex flex-col gap-2 mt-auto">
          <div class="flex gap-2 w-full">
            <div class="w-1/2 flex flex-col">${bTaller} ${txtTallerInfo}</div>
            <div class="w-1/2 flex flex-col">${bRecambios} ${txtRecambiosInfo}</div>
          </div>
        </div>
      </div>`;
    }

    function renderizarDepartamentos(depto) {
       let divP = document.getElementById('contenedorTarjetas');
       let activos = todosLosCoches.filter(c => !c.entregado && c.pasoAInventario !== false && (depto === 'taller' ? (c.enTaller && !c.finTaller) : (c.enRecambios && !c.finRecambios)));
       let p = depto === 'taller' ? 'p' : 'r';
       let propInfo = depto === 'taller' ? 'ordenTaller' : 'ordenRecambios';
       let Tipo = depto === 'taller' ? 'Taller' : 'Recambios';

       let nuevos = activos.filter(c => !c[propInfo]);
       let enRep = activos.filter(c => c[propInfo]);

       divP.innerHTML = `
         <div class="col-span-full mb-1"><h3 class="text-xl font-black flex items-center gap-2 text-[#001e50]"><i class="ph-fill ph-tray-arrow-down"></i> Bandeja Entrada (Nuevas Peticiones)</h3></div>
         ${nuevos.length ? nuevos.map(c => renderActivaDpto(c, p, c, Tipo)).join('') : '<p class="text-gray-400 font-bold col-span-full mb-6 bg-white p-4 rounded-xl border border-gray-200 text-center">Ninguna petición pendiente.</p>'}
         
         <div class="col-span-full mb-1 mt-6 border-t border-gray-200 pt-6"><h3 class="text-xl font-black flex items-center gap-2 text-[#001e50]"><i class="ph-fill ${depto==='taller'?'ph-wrench':'ph-package'}"></i> Gestión en Curso</h3></div>
         ${enRep.length ? enRep.map(c => renderActivaDpto(c, p, c, Tipo)).join('') : '<p class="text-gray-400 font-bold col-span-full bg-white p-4 rounded-xl border border-gray-200 text-center">Sin vehículos en curso.</p>'}
       `;
    }

    function renderActivaDpto(c, pre, obj, tipo) {

      let mS = encodeURIComponent(c.C || ''); let maS = encodeURIComponent(c.B || '');

      let infoExtra = tipo === 'Taller' ? c.instruccionTaller : c.instruccionRecambios;

           <div class="min-w-0 pr-2">
             <h3 class="font-black text-lg text-[#001e50] uppercase truncate">${c.C}</h3>
             <p class="text-[11px] font-bold text-gray-400 mt-1 tracking-widest truncate">VIN: ${c.A}</p>
           </div>
           <button onclick="abrirChat('${c.fila}', '${mS}', '${maS}', '${chatJson}')" class="w-10 h-10 flex-shrink-0 bg-[#25D366] text-white rounded-full flex items-center justify-center hover:bg-[#128C7E] shadow-sm relative transition-transform hover:scale-105"><i class="ph-fill ph-whatsapp-logo text-xl"></i>${obtenerBurbujaChat(c.chatData)}</button>
        </div>
        
        <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
           <span class="bg-gray-100 border border-gray-200 text-gray-800 px-2 py-0.5 rounded text-[10px] font-black tracking-widest">${c.B}</span>
           <span class="text-[9px] font-bold text-gray-400">Petición: ${fEntrada || '-'}</span>
        </div>

        <div class="bg-gray-50 p-3 rounded-lg mb-4 border border-gray-200 flex-grow">
          <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">Motivo / Instrucciones</p>
          <p class="text-sm font-bold text-gray-800 line-clamp-3">${infoExtra || 'Sin motivo especificado.'}</p>
          ${c.urlParte ? `<a href="${c.urlParte}" target="_blank" class="text-xs text-red-600 font-bold mt-2 inline-flex items-center gap-1 hover:underline"><i class="ph-bold ph-file-pdf"></i> Abrir PDF adjunto</a>` : ''}
        </div>

        <div class="space-y-3">
          <div class="flex gap-2">
             <div class="flex-1">
               <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Nº Orden / Pedido</label>
               <input type="text" id="o-${pre}-${c.fila}" value="${c.ordenTaller || c.ordenRecambios || ''}" placeholder="Tu Nº Interno..." class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs font-bold text-gray-700 outline-none focus:ring-1 focus:ring-[#00b0f0] shadow-sm">
             </div>
             <div class="flex-1">
               <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1 ml-1">Previsión Fin</label>
               <input type="date" id="f-${pre}-${c.fila}" value="${c.fechaTaller || c.fechaRecambios || ''}" class="w-full px-3 py-2 bg-white border border-gray-300 rounded-lg text-xs font-bold text-gray-700 outline-none focus:ring-1 focus:ring-[#00b0f0] shadow-sm">
             </div>
          </div>
          <div class="flex gap-2">
            <button onclick="ejecutarDpto('${tipo}', '${c.fila}', false)" class="flex-1 bg-gray-200 text-gray-800 font-bold py-2.5 rounded-lg text-[11px] hover:bg-gray-300 transition-colors uppercase shadow-sm"><i class="ph-bold ph-floppy-disk"></i> Guardar</button>
            <button onclick="ejecutarDpto('${tipo}', '${c.fila}', true)" class="flex-[1.5] bg-[#001e50] text-white font-bold py-2.5 rounded-lg text-[11px] hover:bg-blue-900 transition-colors uppercase flex items-center justify-center gap-1 shadow-sm"><i class="ph-bold ph-check-circle text-sm"></i> Finalizar Trabajo</button>
          </div>
        </div>

    function dibujarCuadranteMes() {
        let div = document.getElementById('contenedorAgenda');
        let agendaEstructurada = {};
        const horasLaborales = ['10', '11', '12', '13', '16', '17', '18', '19'];

        window.datosAgenda.forEach(cita => {
            if (!cita.fechaHora) return;
            let fecha = new Date(cita.fechaHora);
            if (isNaN(fecha.getTime())) return;

            let dateKey = fecha.getFullYear() + "-" + String(fecha.getMonth()+1).padStart(2,'0') + "-" + String(fecha.getDate()).padStart(2,'0');
            let horaStr = fecha.getHours().toString().padStart(2, '0');

            if (!agendaEstructurada[dateKey]) agendaEstructurada[dateKey] = {};
            if (!agendaEstructurada[dateKey][horaStr]) agendaEstructurada[dateKey][horaStr] = { MANUEL: null, ALEJANDRO: null };

            let nombreAgente = (cita.entregador || cita.agente || "MANUEL").toUpperCase();
            agendaEstructurada[dateKey][horaStr][nombreAgente] = cita;
        });

        let anio = window.mesVistaActual.getFullYear();
        let mes = window.mesVistaActual.getMonth();
        let numDiasMes = new Date(anio, mes + 1, 0).getDate();

        let diasArrayKeys = [];
        for(let d = 1; d <= numDiasMes; d++) {
            let cur = new Date(anio, mes, d);
            if (cur.getDay() !== 0 && cur.getDay() !== 6) { 
                let key = cur.getFullYear() + "-" + String(cur.getMonth()+1).padStart(2,'0') + "-" + String(cur.getDate()).padStart(2,'0');
                diasArrayKeys.push(key);
            }
        }

        const nombresMeses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
        let tituloMes = `${nombresMeses[mes]} ${anio}`;
        let hoyKey = new Date().toISOString().split('T')[0];

        let html = `
        <div class="bg-white rounded-xl shadow-xl border border-[#001e50] flex flex-col h-[calc(100vh-140px)] w-full relative">
            <div class="bg-[#001e50] text-white p-3 px-6 flex justify-between items-center shrink-0 z-30">
               <h2 class="text-base font-black tracking-widest uppercase flex items-center gap-2">
                 <i class="ph-bold ph-calendar-grid-week text-xl text-[#00b0f0]"></i> Cuadrante
               </h2>
               
               <div class="flex items-center gap-4 bg-white/10 rounded-lg p-1.5 px-3 border border-white/20 shadow-sm backdrop-blur-sm">
                   <button onclick="cambiarMesAgenda(-1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded text-white transition-colors"><i class="ph-bold ph-caret-left text-xl"></i></button>
                   <span class="font-black text-sm w-36 text-center tracking-widest">${tituloMes}</span>
                   <button onclick="cambiarMesAgenda(1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded text-white transition-colors"><i class="ph-bold ph-caret-right text-xl"></i></button>
               </div>

               <div class="flex gap-4 text-xs font-bold">
                  <span class="flex items-center gap-1.5"><div class="w-3.5 h-3.5 bg-[#c9daf8] rounded-full border border-blue-300"></div> MANUEL</span>
                  <span class="flex items-center gap-1.5"><div class="w-3.5 h-3.5 bg-[#f9cb9c] rounded-full border border-orange-300"></div> ALEJANDRO</span>
               </div>
            </div>
            
            <div class="overflow-auto flex-1 custom-scrollbar relative">
              <table class="w-full text-left border-collapse min-w-max">
                <thead class="sticky top-0 z-20 shadow-md">
                  <tr>
                    <th class="p-3 border-b-2 border-r-2 border-gray-200 bg-gray-100 text-center w-24 sticky left-0 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)]"><i class="ph-bold ph-clock text-2xl text-gray-400"></i></th>
                    ${diasArrayKeys.map(dateKey => {
                        let parts = dateKey.split('-');
                        let fObj = new Date(parts[0], parts[1]-1, parts[2]);
                        let diaSemana = fObj.toLocaleDateString('es-ES', { weekday: 'short' }).toUpperCase();
                        let diaNum = String(fObj.getDate()).padStart(2, '0');
                        let isToday = (dateKey === hoyKey);
                        let bgClass = isToday ? 'bg-blue-100 text-[#001e50]' : 'bg-white text-[#001e50]';
                        
                        return `<th class="p-2 border-b-2 border-r border-gray-200 ${bgClass} text-center min-w-[240px]">
                                  <div class="font-black text-sm">${diaSemana}</div>
                                  <div class="text-3xl font-black ${isToday ? 'text-[#00b0f0]' : ''}">${diaNum}</div>
                                </th>`;
                    }).join('')}
                  </tr>
                </thead>
                <tbody>
        `;

        horasLaborales.forEach(hora => {
            html += `<tr>
                        <td class="p-3 border-b border-r-2 border-gray-200 bg-gray-50 text-center font-black text-gray-500 text-xl align-top pt-4 sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">
                           ${hora}:00

            diasArrayKeys.forEach(dateKey => {
                let isToday = (dateKey === hoyKey);
                let bgTd = isToday ? 'bg-blue-50/20' : 'bg-white';
                
                html += `<td class="p-2.5 border-b border-r border-gray-100 align-top ${bgTd} hover:bg-gray-50 transition-colors">
                            <div class="flex flex-col gap-2 h-full">`;
                
                let cM = agendaEstructurada[dateKey] && agendaEstructurada[dateKey][hora] ? agendaEstructurada[dateKey][hora].MANUEL : null;
                let cA = agendaEstructurada[dateKey] && agendaEstructurada[dateKey][hora] ? agendaEstructurada[dateKey][hora].ALEJANDRO : null;

                if (hora === '19') {
                    if (cM) html += renderizarCeldaCita(cM, 'MANUEL', '#c9daf8', 'text-blue-900', 'border-blue-200', true);
                    else if (cA) html += renderizarCeldaCita(cA, 'ALEJANDRO', '#f9cb9c', 'text-orange-900', 'border-orange-300', true);
                    else html += renderizarCeldaCita(null, 'ÚNICA ENTREGA', '#f3f4f6', 'text-gray-400', 'border-gray-300', true);
                } else {
                    html += renderizarCeldaCita(cM, 'MANUEL', '#c9daf8', 'text-blue-900', 'border-blue-200', false);
                    html += renderizarCeldaCita(cA, 'ALEJANDRO', '#f9cb9c', 'text-orange-900', 'border-orange-300', false);
                }

                html += `   </div>
                          </td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div></div>`;
        div.innerHTML = html;
    }

    window.comprobarAtrasosGenerales = function() {
        let atrasados = [];
        let ahora = new Date();

        window.datosAgenda.forEach(cita => {
            if (!cita.fechaHora) return;
            let fechaCita = new Date(cita.fechaHora);
            let matCita = cita.matricula ? String(cita.matricula).replace(/\s/g, '') : '';
            let basCita = cita.bastidor ? String(cita.bastidor).toUpperCase() : '';
            let cocheEnBaseDatos = todosLosCoches.find(c => (c.B && c.B.replace(/\s/g, '') === matCita) || (c.A && c.A === basCita));

            let yaEntregado = cocheEnBaseDatos && cocheEnBaseDatos.entregado;

            if (fechaCita < ahora && !yaEntregado) {
                let modeloLimpio = cita.modelo ? cita.modelo : "Vehículo";
                let matLimpia = cita.matricula ? cita.matricula : "S/M";
                atrasados.push(`<b>${matLimpia}</b> - ${modeloLimpio}`);
            }
        });

        if (atrasados.length > 0) {
            let listaUnica = [...new Set(atrasados)];
            Swal.fire({
                title: '¡Aviso de Entregas Pendientes!',
                html: `<p class="mb-3 text-gray-600">Tienes <b>${listaUnica.length}</b> entrega(s) con fecha pasada pendientes de confirmar:</p>

                icon: 'info', confirmButtonColor: '#001e50', confirmButtonText: 'Entendido'

        }
    };

    function renderAuditoria(query = "") {
    let lista = document.getElementById('listaAuditoria');
    
    // Convertimos a minúsculas y limpiamos espacios accidentales al principio o final
    let q = query.toLowerCase().trim(); 
    
    // Filtramos los coches
    let activos = todosLosCoches.filter(c => {
        // Si ya está entregado, lo descartamos inmediatamente
        if (c.entregado) return false;
        
        // Creamos una gran cadena de texto con Modelo, Matrícula y Bastidor
        let textoBusqueda = (c.C || "") + " " + (c.B || "") + " " + (c.A || "");
        
        // Comprobamos si lo que has escrito está dentro de esa gran cadena
        return textoBusqueda.toLowerCase().includes(q);
    });
    
    // Si la búsqueda no encuentra nada, mostramos un mensaje amigable
    if (activos.length === 0) {
        lista.innerHTML = '<p class="text-center text-gray-500 font-bold p-4">No se encontraron vehículos con esos datos.</p>';
        return;
    }

    // Si hay resultados, los pintamos
    lista.innerHTML = activos.map(c => `
        <label class="flex items-center gap-4 p-3 border-b border-gray-100 hover:bg-red-50/50 cursor-pointer transition-colors rounded-lg">
           <input type="checkbox" class="check-limpieza w-5 h-5 accent-red-600 cursor-pointer" value="${c.fila}">
           <div class="flex-1">
              <p class="font-bold text-sm text-gray-800">${c.C} - <span class="text-[#001e50] bg-gray-100 px-2 py-0.5 rounded border border-gray-200">${c.B}</span></p>
              <p class="text-[10px] text-gray-500 font-mono mt-1">VIN: ${c.A}</p>
           </div>
        </label>
    `).join('');
}

    async function ejecutarLimpieza() {
       let seleccionados = Array.from(document.querySelectorAll('.check-limpieza:checked')).map(cb => cb.value);
       let activos = todosLosCoches.filter(c => !c.entregado);
       let aBorrar = activos.filter(c => !seleccionados.includes(c.fila));

       if (aBorrar.length === 0) {
           Swal.fire('Atención', 'Has marcado todos los coches, por lo que no se eliminará ninguno.', 'info');
           return;
       }

       const confirm = await Swal.fire({
           title: `¿BORRAR ${aBorrar.length} COCHES?`,
           text: "Esta acción no se puede deshacer. Los coches que NO has seleccionado se eliminarán permanentemente.",
           icon: 'warning', showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#6b7280',
           confirmButtonText: '<i class="ph-bold ph-trash"></i> SÍ, BORRAR TODO LO DESMARCADO', cancelButtonText: 'Cancelar'
       });

       if (confirm.isConfirmed) {
           Swal.fire({title: 'Borrando...', didOpen: () => Swal.showLoading()});
           for (let c of aBorrar) {
               await window.deleteDoc(window.doc(window.db, "vehiculos", c.fila));
           }
           Swal.fire('¡Limpieza realizada!', `Se han borrado ${aBorrar.length} vehículos obsoletos.`, 'success');
           setTimeout(() => cambiarPestana('todos'), 1500);
       }
    }

    async function procesarPDFs(evento) {
      const archivos = evento.target.files;
      if (!archivos || archivos.length === 0) return;
      Swal.fire({ title: `Analizando ${archivos.length} PDFs...`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      let cochesAnadidos = 0;
      const vwModels = ["GOLF", "POLO", "TIGUAN", "T-ROC", "T-CROSS", "TAIGO", "PASSAT", "ARTEON", "TOUAREG", "ID.3", "ID.4", "ID.5", "ID.7", "ID. BUZZ", "CADDY", "CRAFTER", "MULTIVAN", "AMAROK", "TOURAN", "UP!"];

      for (let file of archivos) {
        try {
          const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
          let txt = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            const pagina = await pdf.getPage(i);
            const contenido = await pagina.getTextContent();
            txt += contenido.items.map(item => item.str).join(" ");
          }

          const matchBastidor = txt.match(/\b[A-HJ-NPR-Z0-9]{17}\b/gi);
          if (matchBastidor) {
             const bastidor = matchBastidor[0].toUpperCase();
             const matchMatricula = txt.match(/\b\d{4}\s?[B-DF-HJ-NP-TV-Z]{3}\b/i);
             const matricula = matchMatricula ? matchMatricula[0].replace(/\s/g, '').toUpperCase() : 'S/M';
             let modD = "VW " + file.name.split('.')[0].substring(0, 10); 
             for(let mod of vwModels) { if(txt.toUpperCase().includes(mod)) { modD = "VW " + mod; break; } }

             await window.setDoc(window.doc(window.db, "vehiculos", bastidor), { 
                 bastidor: bastidor, matricula: matricula, modelo: modD, 
                 creadoEn: new Date().getTime(), entregado: false, pasoAInventario: false 
             });
             cochesAnadidos++;
          }
        } catch (error) { console.error(error); }
      }
      document.getElementById('inputUploadPDF').value = ""; 
      Swal.fire('¡Carga Completa!', `Se han enviado ${cochesAnadidos} vehículos a Logística Previa.`, 'success');
    }

                <input id="swal-matricula" class="swal2-input !w-3/4 text-center uppercase" placeholder="Matrícula (Ej: 1234 ABC)">
                <input id="swal-modelo" class="swal2-input !w-3/4 text-center uppercase" placeholder="Modelo (Ej: VW TIGUAN)">
            `,
            showCancelButton: true, confirmButtonColor: '#001e50', confirmButtonText: 'Guardar',
            preConfirm: () => {

    function descargarExcelReal() {
       let cochesAExportar = todosLosCoches.filter(c => !c.entregado && c.pasoAInventario !== false);
       if (cochesAExportar.length === 0) { Swal.fire('Aviso', 'No hay datos activos en inventario', 'info'); return; }
       Swal.fire({title: 'Generando Excel...', didOpen: () => Swal.showLoading()});
       
       let datosExcel = cochesAExportar.map(c => ({
           "MODELO": c.C, "MATRÍCULA": c.B, "BASTIDOR (VIN)": c.A, "RENTING": c.renting || "", "AGENCIA": c.agencia || "",
           "TALLER": c.finTaller ? "FINALIZADO" : (c.enTaller ? "EN TALLER" : "PENDIENTE"),
           "MOTIVO TALLER": c.instruccionTaller || "", "Nº ORDEN TALLER": c.ordenTaller || "", "ENTRADA TALLER": c.fechaEntradaTaller || "", "PREVISIÓN TALLER": c.fechaTaller || "", "FIN TALLER": c.fechaFinTaller || "",
           "RECAMBIOS": c.finRecambios ? "FINALIZADO" : (c.enRecambios ? "EN CURSO" : "PENDIENTE"),
           "MOTIVO RECAMBIOS": c.instruccionRecambios || "", "Nº PEDIDO": c.ordenRecambios || "", "ENTRADA RECAMBIOS": c.fechaEntradaRecambios || "", "PREVISIÓN RECAMBIOS": c.fechaRecambios || "", "FIN RECAMBIOS": c.fechaFinRecambios || "",
           "CITA CLIENTE": c.fechaCita || ""
       }));

       const worksheet = XLSX.utils.json_to_sheet(datosExcel);
       const workbook = XLSX.utils.book_new();
       XLSX.utils.book_append_sheet(workbook, worksheet, "Flota_Activa");
       XLSX.writeFile(workbook, "VW_Flota_" + new Date().toLocaleDateString().replace(/\//g, '-') + ".xlsx");
       Swal.close();
    }

    window.pedirInst = function(btn, idCoche, depto) {
      Swal.fire({
        title: 'Enviar a ' + depto.charAt(0).toUpperCase() + depto.slice(1),
        html: `<input type="text" id="instInput" class="swal2-input" placeholder="Escribe el Motivo/Instrucción..."><br><input type="file" id="fileInput" class="mt-4 text-sm w-3/4" accept=".pdf,image/*">`,
        showCancelButton: true, confirmButtonColor: '#001e50', confirmButtonText: 'Confirmar Solicitud'
      }).then((result) => {
        if (result.isConfirmed) { 
          let ins = document.getElementById('instInput').value; let f = document.getElementById('fileInput').files[0];
          if(f) subirYEnviar(idCoche, depto, ins, f); else mandar(idCoche, depto, ins);
        }
      });
    }

    async function subirYEnviar(id, depto, ins, file) {
      Swal.fire({title: 'Adjuntando...', didOpen: () => Swal.showLoading()});
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = async () => {
        const urlDrive = 'https://script.google.com/macros/s/AKfycbxec72BCUB3fA_ZtBAe8Zs7dqE00MScDbCGSqeQguIVHlH6S8q0vqNBbtGwk_1vPeNYjw/exec'; 
        try {
          const res = await fetch(urlDrive, { method: 'POST', body: JSON.stringify({ base64: reader.result, fileName: file.name, mimeType: file.type }) });
          const data = await res.json();
          let fHoy = new Date().toLocaleDateString();
          let upd = depto === 'taller' ? { enTaller: true, instruccionTaller: ins, urlParte: data.url, fechaEntradaTaller: fHoy, finTaller: false } : { enRecambios: true, instruccionRecambios: ins, urlParte: data.url, fechaEntradaRecambios: fHoy, finRecambios: false };
          await window.updateDoc(window.doc(window.db, "vehiculos", id), upd);
          Swal.fire('Éxito', 'Enviado correctamente', 'success');
        } catch (e) { Swal.fire('Error', e.message, 'error'); }
      };
    }

    async function mandar(id, depto, ins) {
      let fHoy = new Date().toLocaleDateString();
      let upd = depto === 'taller' ? { enTaller: true, instruccionTaller: ins, fechaEntradaTaller: fHoy, finTaller: false } : { enRecambios: true, instruccionRecambios: ins, fechaEntradaRecambios: fHoy, finRecambios: false };
      await window.updateDoc(window.doc(window.db, "vehiculos", id), upd);
    }

    window.abrirChat = async function(id, mod, mat, jsonStr) {
      document.getElementById('chatFilaActiva').value = id;
      document.getElementById('chatTituloCoche').innerText = decodeURIComponent(mod);
      document.getElementById('chatSubtitulo').innerText = "Matrícula: " + decodeURIComponent(mat);
      
      let chatObj = { history: [], lastOpened: {} }; 
      try { if (jsonStr && jsonStr !== "undefined") { chatObj = JSON.parse(decodeURIComponent(jsonStr)); } } catch(e) {}
      
      let updateData = {}; updateData[`chatInfo.lastOpened.${userRole.toUpperCase()}`] = new Date().getTime();
      window.updateDoc(window.doc(window.db, "vehiculos", id), updateData).catch(e=>console.log(e));

      dibujarMsj(chatObj.history); document.getElementById('chatModal').classList.remove('hidden');
    }

    window.cerrarChat = function() { document.getElementById('chatModal').classList.add('hidden'); }

    function dibujarMsj(hist) {
      const cont = document.getElementById('chatMessages');
      if (!hist || hist.length === 0) { cont.innerHTML = `<p class="text-center text-xs font-bold text-gray-500 mt-4 bg-white/50 p-2 rounded-lg mx-auto w-max border border-gray-200">Historial vacío.</p>`; return; }
      cont.innerHTML = hist.map(m => {
        const isMe = (m.rol || "").toUpperCase() === userRole.toUpperCase();
        let hStr = m.fecha ? new Date(m.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        let rStr = isMe ? '' : `<div class="text-[10px] font-bold text-[#075e54] mb-0.5">${m.rol}</div>`;
        return `<div class="wa-bubble ${isMe ? 'wa-me' : 'wa-other border border-gray-200 shadow-sm'}">${rStr}<div>${m.texto}</div><span class="wa-time">${hStr}</span></div>`;
      }).join('');
      setTimeout(() => cont.scrollTop = cont.scrollHeight, 50);
    }

    window.enviarMensajeChat = async function() {
      const input = document.getElementById('chatInput'); const id = document.getElementById('chatFilaActiva').value; const txt = input.value.trim();
      if (!id || !txt) return; input.value = "";
      
      const nuevoMensaje = { rol: userRole.toUpperCase(), fecha: new Date().getTime(), texto: txt };
      const ref = window.doc(window.db, "vehiculos", id);
      
      let updateData = { "chatInfo.history": window.arrayUnion(nuevoMensaje) };
      updateData[`chatInfo.lastOpened.${userRole.toUpperCase()}`] = new Date().getTime();
      
      await window.updateDoc(ref, updateData);
    }
    window.migrarTodosALogistica = async function() {
    // Filtramos solo los que están actualmente en inventario (pasoAInventario === true) y no entregados
    const cochesAConvertir = todosLosCoches.filter(c => c.pasoAInventario === true && !c.entregado);

    if (cochesAConvertir.length === 0) {
        Swal.fire('Información', 'No hay coches en inventario para mover a logística.', 'info');
        return;
    }

    const confirm = await Swal.fire({
        title: `¿Mover ${cochesAConvertir.length} coches a Logística?`,
        text: "Esto cambiará el estado de todos tus coches en Inventario a Logística de forma automática.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: 'Sí, mover todos'
    });

    if (confirm.isConfirmed) {
        Swal.fire({ title: 'Procesando...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
        
        for (let c of cochesAConvertir) {
            // Actualizamos en Firebase
            await window.updateDoc(window.doc(window.db, "vehiculos", c.fila), { 
                pasoAInventario: false 
            });
        }
        
        Swal.fire('¡Éxito!', `Se han movido ${cochesAConvertir.length} vehículos a Logística.`, 'success');
    }
}
